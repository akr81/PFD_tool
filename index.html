      function renderNodeDetailBadges(el, node) {
        if (isCrtNode(node)) return;
        if (isEcNode(node)) return;
        if (isSttNode(node)) return;
        const statuses = normalizeStatuses(node.statuses);
        const editingField = state.editingNodeField?.nodeId === node.id ? state.editingNodeField.field : null;

        if (editingField === "statuses") {
          renderNodeStatusEditor(el, node, statuses);
        } else if (statuses.length) {
          const statusList = document.createElement("div");
          statusList.className = "node-status-icons";
          statusList.innerHTML = statuses.map(renderStatusIcon).join("");
          el.append(statusList);
        }

        const estimate = (node.estimate || "").trim();
        const owner = (node.owner || "").trim();
        if (editingField === "estimate") {
          renderNodeTextFieldEditor(el, node, "estimate", estimate);
        }
        if (editingField === "owner") {
          renderNodeTextFieldEditor(el, node, "owner", owner);
        }
        if (estimate || owner || editingField === "estimate" || editingField === "owner") {
          const meta = document.createElement("div");
          meta.className = "node-meta-row";
          meta.innerHTML = `
            <span class="node-meta estimate" data-node-field-hotspot="estimate" title="${escapeAttribute(estimate)}">${editingField === "estimate" ? "" : escapeHtml(estimate)}</span>
            <span class="node-meta owner" data-node-field-hotspot="owner" title="${escapeAttribute(owner)}">${editingField === "owner" ? "" : escapeHtml(owner)}</span>
          `;
          el.append(meta);
        }
      }

      function renderNodeTextFieldEditor(el, node, field, value) {
        const editor = document.createElement("div");
        editor.className = `node-field-editor ${field}`;
        const listAttr = field === "owner" ? ` list="${nodeOwnerSuggestionListId(node.id)}"` : "";
        const listHtml = field === "owner" ? renderNodeOwnerDatalist(node.id, value) : "";
        editor.innerHTML = `
          <input class="node-field-input ${field}" data-node-field-input="${field}" value="${escapeAttribute(value)}"${listAttr} autocomplete="off" spellcheck="false">
          ${listHtml}
        `;
        const input = editor.querySelector("[data-node-field-input]");
        input.addEventListener("blur", () => saveNodeFieldEdit());
        el.append(editor);
      }

      function renderNodeStatusEditor(el, node, statuses) {
        const selected = new Set(statuses);
        const editor = document.createElement("div");
        editor.className = "node-field-editor node-status-editor";
        editor.innerHTML = STATUS_OPTIONS.map(status => `
          <label class="node-status-choice" title="${escapeAttribute(status.label)}">
            <input type="checkbox" data-node-status-editor="${escapeAttribute(status.id)}"${selected.has(status.id) ? " checked" : ""}>
            ${renderStatusIcon(status.id)}${escapeHtml(status.label)}
          </label>
        `).join("");
        el.append(editor);
      }

      function nodeOwnerSuggestionListId(nodeId) {
        return `nodeOwnerSuggestions-${String(nodeId).replace(/[^a-zA-Z0-9_-]/g, "-")}`;
      }

      function renderNodeOwnerDatalist(nodeId, value) {
        return `
          <datalist id="${escapeAttribute(nodeOwnerSuggestionListId(nodeId))}">
            ${ownerSuggestions(value).map(owner => `<option value="${escapeAttribute(owner)}"></option>`).join("")}
          </datalist>
        `;
      }

      function renderEdges() {
        [...edgesSvg.querySelectorAll(".edge-dynamic, .edge-hit")].forEach(el => el.remove());
        edgeControlLayer.innerHTML = "";
        const criticalEdges = state.viewMode === "detail" ? criticalPathEdgeIds() : new Set();
        const crtAnd = isCrtDiagram() ? crtAndGroups() : { groups: [], edgeToGroup: new Map() };
        const renderedAndOutputs = new Set();
        renderCrtAndNodes(crtAnd.groups);
        state.edges.forEach(edge => {
          const from = findNode(edge.from);
          const to = findNode(edge.to);
          if (!from || !to) return;
          const selected = state.selected?.type === "edge" && state.selected.id === edge.id;
          const critical = criticalEdges.has(edge.id);
          const conflict = edge.kind === "conflict";
          const andGroup = crtAnd.edgeToGroup.get(edge.id);
          const targetNode = andGroup || to;
          const targetSide = andGroup ? "bottom" : edge.toSide;
          const d = conflict ? conflictPath(from, to, edge.fromSide, edge.toSide) : edgePath(from, targetNode, edge.fromSide, targetSide);

          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("class", `edge edge-dynamic${critical ? " critical" : ""}${conflict ? " conflict" : ""}${selected ? " selected" : ""}`);
          path.setAttribute("d", d);
          if (!conflict) {
            path.setAttribute("marker-end", critical ? "url(#arrow-critical)" : (selected ? "url(#arrow-selected)" : "url(#arrow)"));
          }
          edgesSvg.append(path);

          if (andGroup) {
            const outputKey = `${andGroup.key}->${to.id}`;
            if (!renderedAndOutputs.has(outputKey)) {
              renderedAndOutputs.add(outputKey);
              const groupSelected = andGroup.edges.some(groupEdge => state.selected?.type === "edge" && state.selected.id === groupEdge.id);
              const outputPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
              outputPath.setAttribute("class", `edge edge-dynamic crt-and-output${groupSelected ? " selected" : ""}`);
              outputPath.setAttribute("d", edgePath(andGroup, to, "top", "bottom"));
              outputPath.setAttribute("marker-end", groupSelected ? "url(#arrow-selected)" : "url(#arrow)");
              edgesSvg.append(outputPath);
            }
          }

          if (isEcDiagram()) return;

          const hit = document.createElementNS("http://www.w3.org/2000/svg", "path");
          hit.setAttribute("class", "edge-hit edge-dynamic");
          hit.setAttribute("d", d);
          hit.dataset.edgeId = edge.id;
          hit.addEventListener("click", event => {
            event.stopPropagation();
            selectEdge(edge.id);
          });
          edgesSvg.append(hit);

          const midpoint = edgeMidpoint(from, targetNode, edge.fromSide, targetSide);
          const handle = document.createElement("button");
          handle.className = `edge-handle${selected ? " selected" : ""}`;
          handle.type = "button";
          handle.dataset.edgeId = edge.id;
          handle.style.left = `${midpoint.x}px`;
          handle.style.top = `${midpoint.y}px`;
          handle.title = selected ? (isCrtDiagram() ? "AND条件を設定" : "接続を削除") : "接続を選択";
          handle.setAttribute("aria-label", selected ? (isCrtDiagram() ? "AND条件を設定" : "接続を削除") : "接続を選択");
          handle.innerHTML = selected
            ? (isCrtDiagram()
              ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M4 8h16"></path><path d="M4 16h16"></path><circle cx="9" cy="8" r="2"></circle><circle cx="15" cy="16" r="2"></circle></svg>`
              : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15"></path></svg>`)
            : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M5 12h14"></path><path d="m13 6 6 6-6 6"></path></svg>`;
          handle.addEventListener("click", event => {
            event.stopPropagation();
            if (state.selected?.type === "edge" && state.selected.id === edge.id) {
              if (isCrtDiagram()) {
                selectEdge(edge.id);
              } else {
                deleteSelection();
              }
            } else {
              selectEdge(edge.id);
            }
          });
          edgeControlLayer.append(handle);
          if (selected && isCrtDiagram()) {
            renderCrtAndEditor(edge, midpoint);
          }
        });
      }

      function renderCrtAndNodes(groups) {
        groups.forEach(group => {
          const el = document.createElement("div");
          el.className = "crt-and-node";
          el.style.left = `${group.x}px`;
          el.style.top = `${group.y}px`;
          el.textContent = `AND${group.andId}`;
          edgeControlLayer.append(el);
        });
      }

      function renderCrtAndEditor(edge, midpoint) {
        const editor = document.createElement("div");
        editor.className = "crt-and-editor";
        editor.style.left = `${midpoint.x}px`;
        editor.style.top = `${midpoint.y}px`;
        editor.innerHTML = `
          <select class="crt-and-select" data-crt-and-edge="${escapeAttribute(edge.id)}" aria-label="AND条件">
            ${crtAndOptions(edge.and).map(option => `<option value="${escapeAttribute(option.value)}"${option.selected ? " selected" : ""}>${escapeHtml(option.label)}</option>`).join("")}
          </select>
          <button class="crt-edge-delete" type="button" data-crt-edge-delete="${escapeAttribute(edge.id)}" title="接続を削除" aria-label="接続を削除">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15"></path></svg>
          </button>
        `;
        editor.querySelector("[data-crt-and-edge]")?.addEventListener("change", event => {
          event.stopPropagation();
          setCrtEdgeAnd(edge.id, event.target.value);
        });
        editor.querySelector("[data-crt-edge-delete]")?.addEventListener("click", event => {
          event.stopPropagation();
          deleteSelection();
        });
        edgeControlLayer.append(editor);
      }

      function crtAndGroups() {
        const groups = new Map();
        const edgeToGroup = new Map();
        state.edges.forEach(edge => {
          const andId = normalizeCrtAnd(edge.and);
          if (andId === "None") return;
          const source = findNode(edge.from);
          const target = findNode(edge.to);
          if (!source || !target || !isCrtNode(source) || !isCrtNode(target)) return;
          const key = andId;
          if (!groups.has(key)) {
            groups.set(key, {
              id: `crt-and-${andId}`,
              type: "crtAnd",
              key,
              andId,
              targets: new Map(),
              edges: [],
              x: 0,
              y: 0
            });
          }
          const group = groups.get(key);
          group.edges.push(edge);
          group.targets.set(target.id, target);
          edgeToGroup.set(edge.id, group);
        });

        groups.forEach(group => {
          const sources = group.edges
            .map(edge => findNode(edge.from))
            .filter(Boolean);
          const targets = [...group.targets.values()];
          const sourceAverageX = sources.reduce((sum, node) => sum + node.x, 0) / Math.max(1, sources.length);
          const sourceAverageY = sources.reduce((sum, node) => sum + node.y, 0) / Math.max(1, sources.length);
          const targetAverageX = targets.reduce((sum, node) => sum + node.x, 0) / Math.max(1, targets.length);
          const targetAverageY = targets.reduce((sum, node) => sum + node.y, 0) / Math.max(1, targets.length);
          group.x = Math.round((sourceAverageX * 0.62 + targetAverageX * 0.38) * 10) / 10;
          group.y = Math.round(((sourceAverageY + targetAverageY) / 2) * 10) / 10;
        });

        return {
          groups: [...groups.values()],
          edgeToGroup
        };
      }

      function crtAndIds() {
        return [...new Set(state.edges
          .map(edge => normalizeCrtAnd(edge.and))
          .filter(id => id !== "None"))]
          .sort((left, right) => {
            const leftNumber = Number(left);
            const rightNumber = Number(right);
            if (Number.isFinite(leftNumber) && Number.isFinite(rightNumber)) return leftNumber - rightNumber;
            return left.localeCompare(right, "ja");
          });
      }

      function nextCrtAndId() {
        const existing = new Set(crtAndIds());
        for (let index = 1; index < 100; index += 1) {
          const id = String(index);
          if (!existing.has(id)) return id;
        }
        return String(existing.size + 1);
      }

      function crtAndOptions(currentValue) {
        const current = normalizeCrtAnd(currentValue);
        const ids = crtAndIds();
        if (current !== "None" && !ids.includes(current)) ids.push(current);
        return [
          { value: "None", label: "ANDなし", selected: current === "None" },
          ...ids.map(id => ({ value: id, label: `AND${id}`, selected: current === id })),
          { value: "__new__", label: "新しいAND", selected: false }
        ];
      }

      function setCrtEdgeAnd(edgeId, value) {
        const edge = findEdge(edgeId);
        if (!edge || !isCrtDiagram()) return;
        const nextValue = value === "__new__" ? nextCrtAndId() : normalizeCrtAnd(value);
        if (normalizeCrtAnd(edge.and) === nextValue) return;
        recordHistory();
        edge.and = nextValue;
        state.selected = { type: "edge", id: edge.id };
        autoLayout();
        render();
        saveState();
        setStatus(nextValue === "None" ? "AND条件を解除しました" : `AND${nextValue}を設定しました`);
      }

      function selectEdge(edgeId) {
        if (!findEdge(edgeId)) return;
        state.selected = { type: "edge", id: edgeId };
        state.pendingPort = null;
        state.editingNodeField = null;
        state.detailVisible = false;
        state.detailEditing = false;
        state.detailEditingNodeId = null;
        closePalette();
        render();
        setStatus(isCrtDiagram() ? "接続を選択しました。AND条件を設定できます" : "接続を選択しました。削除ボタンまたはDeleteキーで消せます");
      }

      function renderGhostEdge() {
        edgesSvg.querySelectorAll(".ghost").forEach(el => el.remove());
        if (!state.pendingPort) return;
        const source = findNode(state.pendingPort.nodeId);
        if (!source) return;
        const start = portPoint(source, state.pendingPort.side);
        const dir = DIRS[state.pendingPort.side];
        const end = { x: start.x + dir.x * 120, y: start.y + dir.y * 120 };
        if (!dir.x && !dir.y) return;
        const d = cubicPath(start, end, state.pendingPort.side, OPPOSITE[state.pendingPort.side]);
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "edge ghost");
        path.setAttribute("d", d);
        edgesSvg.append(path);
      }

      function portPoint(node, side) {
        const { width, height } = nodeSize(node);
        if (side === "top") return { x: node.x, y: node.y - height / 2 };
        if (side === "right") return { x: node.x + width / 2, y: node.y };
        if (side === "bottom") return { x: node.x, y: node.y + height / 2 };
        return { x: node.x - width / 2, y: node.y };
      }

      function nodeSize(node) {
        const detailMode = state.viewMode === "detail";
        if (node.type === "stt") {
          return estimateSttNodeSize(node);
        }
        if (node.type === "crt") {
          return estimateCrtNodeSize(node);
        }
        if (node.type === "crtAnd") {
          return { width: 58, height: 34 };
        }
        if (node.type === "ec") {
          return estimateEcNodeSize(node);
        }
        return {
          width: node.type === "process" ? 164 : 150,
          height: node.type === "process"
            ? (detailMode ? 100 : 86)
            : (detailMode ? 90 : 72)
        };
      }

      function estimateEcNodeSize(node) {
        const assumption = node.ecKind === "assumption";
        const width = assumption ? 228 : 238;
        const minHeight = assumption ? 96 : 108;
        const textSize = normalizeNodeTextSize(state.nodeTextSize);
        const charsPerLine = Math.max(8, Math.floor((width - 38) / (textSize * (assumption ? .78 : .86))));
        const lines = estimateWrappedLines(node.text || ecNodeTitle(node), charsPerLine);
        const contentHeight = lines * Math.max(17, textSize * (assumption ? 1.2 : 1.32));
        return {
          width,
          height: Math.ceil(Math.max(minHeight, 46 + contentHeight))
        };
      }

      function estimateCrtNodeSize(node) {
        const width = 238;
        const minHeight = 108;
        const textSize = normalizeNodeTextSize(state.nodeTextSize);
        const charsPerLine = Math.max(8, Math.floor((width - 38) / (textSize * .86)));
        const lines = estimateWrappedLines(node.text || "CRTエンティティ", charsPerLine);
        const contentHeight = lines * Math.max(17, textSize * 1.3);
        return {
          width,
          height: Math.ceil(Math.max(minHeight, 48 + contentHeight))
        };
      }

      function estimateSttNodeSize(node) {
        const detailMode = state.viewMode === "detail";
        const width = detailMode ? 380 : 262;
        const minHeight = detailMode ? 260 : 152;
        const textSize = normalizeNodeTextSize(state.nodeTextSize);
        const charsPerLine = Math.max(8, Math.floor((width - 38) / (textSize * (detailMode ? 1.03 : .92))));
        const fields = sttVisibleFields();
        const stt = normalizeSttFields(node.stt || node);
        const rowGap = 6;
        const idHeight = 22;
        const padding = detailMode ? 24 : 22;
        const rowHeights = fields.map(field => {
          const value = (stt[field.key] || "未設定").trim();
          const lines = estimateWrappedLines(value, charsPerLine);
          return Math.max(36, 19 + lines * Math.max(16, textSize * 1.35));
        });
        const rowsHeight = rowHeights.reduce((sum, value) => sum + value, 0);
        const gapHeight = Math.max(0, fields.length - 1) * rowGap;
        return {
          width,
          height: Math.ceil(Math.max(minHeight, padding + idHeight + rowGap + rowsHeight + gapHeight))
        };
      }

      function sttVisibleFields() {
        return state.viewMode === "detail"
          ? STT_FIELDS
          : STT_FIELDS.filter(field => field.key === "strategy" || field.key === "tactics");
      }

      function estimateWrappedLines(value, charsPerLine) {
        const text = String(value || "");
        return text.split(/\r?\n/).reduce((sum, line) => {
          const length = Math.max(1, [...line].length);
          return sum + Math.max(1, Math.ceil(length / charsPerLine));
        }, 0);
      }

      function edgePath(from, to, fromSide, toSide) {
        const escaped = escapedRoutePoints(from, to, fromSide, toSide);
        if (escaped) return roundedPolylinePath(escaped, 24);
        return cubicPath(portPoint(from, fromSide), portPoint(to, toSide), fromSide, toSide);
      }

      function conflictPath(from, to, fromSide, toSide) {
        const start = portPoint(from, fromSide);
        const end = portPoint(to, toSide);
        const midX = (start.x + end.x) / 2;
        const yAt = t => start.y + (end.y - start.y) * t;
        const amplitude = Math.max(13, Math.min(24, Math.abs(end.x - start.x) * .06));
        const points = [
          start,
          { x: midX - 42, y: yAt(.36) },
          { x: midX - 22, y: yAt(.44) - amplitude },
          { x: midX - 6, y: yAt(.5) + amplitude },
          { x: midX + 10, y: yAt(.56) - amplitude },
          { x: midX + 30, y: yAt(.64) + amplitude * .45 },
          end
        ];
        return points.map((point, index) => `${index ? "L" : "M"} ${point.x} ${point.y}`).join(" ");
      }

      function edgeMidpoint(from, to, fromSide, toSide) {
        const escaped = escapedRoutePoints(from, to, fromSide, toSide);
        if (escaped) return polylineMidpoint(escaped);
        const start = portPoint(from, fromSide);
        const end = portPoint(to, toSide);
        const { c1, c2 } = cubicControlPoints(start, end, fromSide, toSide);
        return cubicPoint(start, c1, c2, end, .5);
      }

      function escapedRoutePoints(from, to, fromSide, toSide) {
        const start = portPoint(from, fromSide);
        const end = portPoint(to, toSide);
        if (!shouldEscapeRoute(from, to, fromSide, toSide, start, end)) return null;
        return orthogonalRoutePoints(from, to, fromSide, toSide);
      }

      function shouldEscapeRoute(from, to, fromSide, toSide, start, end) {
        const verticalBacktrack = fromSide === "top" && toSide === "bottom" && start.y <= end.y;
        const horizontalBacktrack = fromSide === "right" && toSide === "left" && start.x >= end.x;
        if (verticalBacktrack || horizontalBacktrack) return true;
        return routeObstacles(from, to)
          .filter(rect => rect.role === "obstacle")
          .some(rect => segmentIntersectsRect(start, end, rect));
      }

      function orthogonalRoutePoints(from, to, fromSide, toSide) {
        const start = portPoint(from, fromSide);
        const end = portPoint(to, toSide);
        const sourceDir = DIRS[fromSide] || { x: 0, y: 0 };
        const targetDir = DIRS[toSide] || { x: 0, y: 0 };
        const stub = 34;
        const startExit = {
          x: start.x + sourceDir.x * stub,
          y: start.y + sourceDir.y * stub
        };
        const endExit = {
          x: end.x + targetDir.x * stub,
          y: end.y + targetDir.y * stub
        };
        const obstacles = routeObstacles(from, to);
        const candidates = orthogonalRouteCandidates(start, startExit, endExit, end, fromSide, toSide, obstacles)
          .map(dedupeRoutePoints)
          .map(points => ({
            points,
            score: routeScore(points, obstacles)
          }))
          .sort((left, right) => left.score - right.score);
        return candidates[0]?.points || [start, end];
      }

      function orthogonalRouteCandidates(start, startExit, endExit, end, fromSide, toSide, obstacles) {
        const routes = [];
        const fromVertical = Math.abs((DIRS[fromSide] || {}).y || 0) > 0;
        const toVertical = Math.abs((DIRS[toSide] || {}).y || 0) > 0;
        const laneGap = 82;
        const obstacleGap = 34;
        const minX = Math.min(startExit.x, endExit.x);
        const maxX = Math.max(startExit.x, endExit.x);
        const minY = Math.min(startExit.y, endExit.y);
        const maxY = Math.max(startExit.y, endExit.y);
        const midX = (startExit.x + endExit.x) / 2;
        const midY = (startExit.y + endExit.y) / 2;
        const laneXs = [midX, minX - laneGap, maxX + laneGap];
        const laneYs = [midY, minY - laneGap, maxY + laneGap];
        const verticalBacktrack = fromSide === "top" && toSide === "bottom" && start.y <= end.y;
        const horizontalBacktrack = fromSide === "right" && toSide === "left" && start.x >= end.x;

        obstacles.forEach(rect => {
          if (intervalsOverlap(minX, maxX, rect.left, rect.right)) {
            laneYs.push(rect.top - obstacleGap, rect.bottom + obstacleGap);
          }
          if (intervalsOverlap(minY, maxY, rect.top, rect.bottom)) {
            laneXs.push(rect.left - obstacleGap, rect.right + obstacleGap);
          }
        });

        const xLanes = uniqueNumbers(laneXs).sort((left, right) => Math.abs(left - midX) - Math.abs(right - midX));
        const yLanes = uniqueNumbers(laneYs).sort((left, right) => Math.abs(left - midY) - Math.abs(right - midY));

        if (verticalBacktrack) {
          return sideLoopRouteCandidates(start, startExit, endExit, end, obstacles, "vertical");
        }

        if (horizontalBacktrack) {
          return sideLoopRouteCandidates(start, startExit, endExit, end, obstacles, "horizontal");
        }

        if (fromVertical && toVertical) {
          yLanes.forEach(y => {
            routes.push([start, startExit, { x: startExit.x, y }, { x: endExit.x, y }, endExit, end]);
          });
          xLanes.forEach(x => {
            routes.push([start, startExit, { x, y: startExit.y }, { x, y: endExit.y }, endExit, end]);
          });
          return routes;
        }

        if (!fromVertical && !toVertical) {
          xLanes.forEach(x => {
            routes.push([start, startExit, { x, y: startExit.y }, { x, y: endExit.y }, endExit, end]);
          });
          yLanes.forEach(y => {
            routes.push([start, startExit, { x: startExit.x, y }, { x: endExit.x, y }, endExit, end]);
          });
          return routes;
        }

        routes.push([start, startExit, { x: endExit.x, y: startExit.y }, endExit, end]);
        routes.push([start, startExit, { x: startExit.x, y: endExit.y }, endExit, end]);
        yLanes.forEach(y => {
          routes.push([start, startExit, { x: startExit.x, y }, { x: endExit.x, y }, endExit, end]);
        });
        xLanes.forEach(x => {
          routes.push([start, startExit, { x, y: startExit.y }, { x, y: endExit.y }, endExit, end]);
        });
        return routes;
      }

      function sideLoopRouteCandidates(start, startExit, endExit, end, obstacles, axis) {
        const padding = 84;
        const routes = [];
        if (axis === "vertical") {
          const spanTop = Math.min(start.y, startExit.y, endExit.y, end.y);
          const spanBottom = Math.max(start.y, startExit.y, endExit.y, end.y);
          const relevant = obstacles.filter(rect => intervalsOverlap(spanTop, spanBottom, rect.top, rect.bottom));
          const left = Math.min(start.x, end.x, ...relevant.map(rect => rect.left)) - padding;
          const right = Math.max(start.x, end.x, ...relevant.map(rect => rect.right)) + padding;
          [right, left].forEach(x => {
            routes.push([start, startExit, { x, y: startExit.y }, { x, y: endExit.y }, endExit, end]);
          });
          return routes;
        }

        const spanLeft = Math.min(start.x, startExit.x, endExit.x, end.x);
        const spanRight = Math.max(start.x, startExit.x, endExit.x, end.x);
        const relevant = obstacles.filter(rect => intervalsOverlap(spanLeft, spanRight, rect.left, rect.right));
        const top = Math.min(start.y, end.y, ...relevant.map(rect => rect.top)) - padding;
        const bottom = Math.max(start.y, end.y, ...relevant.map(rect => rect.bottom)) + padding;
        [bottom, top].forEach(y => {
          routes.push([start, startExit, { x: startExit.x, y }, { x: endExit.x, y }, endExit, end]);
        });
        return routes;
      }

      function routeObstacles(from, to) {
        const endpoints = new Set([from?.id, to?.id].filter(Boolean));
        const obstacles = visibleNodes()
          .filter(node => !endpoints.has(node.id))
          .map(node => ({ ...nodeRect(node, 22), role: "obstacle" }));
        if (from) obstacles.push({ ...nodeRect(from, 12), role: "source" });
        if (to) obstacles.push({ ...nodeRect(to, 12), role: "target" });
        return obstacles;
      }

      function nodeRect(node, padding = 0) {
        const { width, height } = nodeSize(node);
        return {
          left: node.x - width / 2 - padding,
          right: node.x + width / 2 + padding,
          top: node.y - height / 2 - padding,
          bottom: node.y + height / 2 + padding
        };
      }

      function routeScore(points, obstacles) {
        let length = 0;
        let bends = 0;
        let collisions = 0;
        for (let index = 1; index < points.length; index += 1) {
          const previous = points[index - 1];
          const current = points[index];
          length += Math.abs(current.x - previous.x) + Math.abs(current.y - previous.y);
          collisions += obstacles.filter(rect => {
            if (rect.role === "source" && index === 1) return false;
            if (rect.role === "target" && index === points.length - 1) return false;
            return segmentIntersectsRect(previous, current, rect);
          }).length;
          if (index >= 2) {
            const before = points[index - 2];
            const firstHorizontal = Math.abs(previous.y - before.y) < .1;
            const secondHorizontal = Math.abs(current.y - previous.y) < .1;
            if (firstHorizontal !== secondHorizontal) bends += 1;
          }
        }
        return length + bends * 18 + collisions * 100000;
      }

      function segmentIntersectsRect(start, end, rect) {
        const horizontal = Math.abs(start.y - end.y) < .1;
        const vertical = Math.abs(start.x - end.x) < .1;
        if (horizontal) {
          const minX = Math.min(start.x, end.x);
          const maxX = Math.max(start.x, end.x);
          return start.y >= rect.top && start.y <= rect.bottom && intervalsOverlap(minX, maxX, rect.left, rect.right);
        }
        if (vertical) {
          const minY = Math.min(start.y, end.y);
          const maxY = Math.max(start.y, end.y);
          return start.x >= rect.left && start.x <= rect.right && intervalsOverlap(minY, maxY, rect.top, rect.bottom);
        }
        const minX = Math.min(start.x, end.x);
        const maxX = Math.max(start.x, end.x);
        const minY = Math.min(start.y, end.y);
        const maxY = Math.max(start.y, end.y);
        return intervalsOverlap(minX, maxX, rect.left, rect.right) && intervalsOverlap(minY, maxY, rect.top, rect.bottom);
      }

      function intervalsOverlap(firstStart, firstEnd, secondStart, secondEnd) {
        return Math.max(firstStart, secondStart) <= Math.min(firstEnd, secondEnd);
      }

      function uniqueNumbers(values) {
        const seen = new Set();
        return values.filter(value => {
          const key = Math.round(value * 10) / 10;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      function dedupeRoutePoints(points) {
        const filtered = [];
        points.forEach(point => {
          const next = {
            x: Math.round(point.x * 10) / 10,
            y: Math.round(point.y * 10) / 10
          };
          const last = filtered[filtered.length - 1];
          if (!last || Math.abs(last.x - next.x) > .1 || Math.abs(last.y - next.y) > .1) {
            filtered.push(next);
          }
        });

        const compact = [];
        filtered.forEach(point => {
          compact.push(point);
          while (compact.length >= 3) {
            const start = compact[compact.length - 3];
            const middle = compact[compact.length - 2];
            const end = compact[compact.length - 1];
            const sameX = Math.abs(start.x - middle.x) < .1 && Math.abs(middle.x - end.x) < .1;
            const sameY = Math.abs(start.y - middle.y) < .1 && Math.abs(middle.y - end.y) < .1;
            if (!sameX && !sameY) break;
            compact.splice(compact.length - 2, 1);
          }
        });
        return compact;
      }

      function polylinePath(points) {
        return points.map((point, index) => `${index ? "L" : "M"} ${point.x} ${point.y}`).join(" ");
      }

      function roundedPolylinePath(points, radius = 20) {
        const route = dedupeRoutePoints(points);
        if (route.length <= 2) return polylinePath(route);
        let d = `M ${route[0].x} ${route[0].y}`;
        for (let index = 1; index < route.length - 1; index += 1) {
          const previous = route[index - 1];
          const current = route[index];
          const next = route[index + 1];
          const incoming = {
            x: current.x - previous.x,
            y: current.y - previous.y
          };
          const outgoing = {
            x: next.x - current.x,
            y: next.y - current.y
          };
          const incomingLength = Math.hypot(incoming.x, incoming.y);
          const outgoingLength = Math.hypot(outgoing.x, outgoing.y);
          const cornerRadius = Math.min(radius, incomingLength / 2, outgoingLength / 2);
          if (cornerRadius < 1) {
            d += ` L ${current.x} ${current.y}`;
            continue;
          }
          const before = {
            x: current.x - incoming.x / incomingLength * cornerRadius,
            y: current.y - incoming.y / incomingLength * cornerRadius
          };
          const after = {
            x: current.x + outgoing.x / outgoingLength * cornerRadius,
            y: current.y + outgoing.y / outgoingLength * cornerRadius
          };
          d += ` L ${roundPoint(before.x)} ${roundPoint(before.y)} Q ${current.x} ${current.y} ${roundPoint(after.x)} ${roundPoint(after.y)}`;
        }
        const last = route[route.length - 1];
        return `${d} L ${last.x} ${last.y}`;
      }

      function roundPoint(value) {
        return Math.round(value * 10) / 10;
      }

      function polylineMidpoint(points) {
        const total = points.slice(1).reduce((sum, point, index) => {
          const previous = points[index];
          return sum + Math.abs(point.x - previous.x) + Math.abs(point.y - previous.y);
        }, 0);
        if (!total) return points[0] || { x: 0, y: 0 };
        const target = total / 2;
        let distance = 0;
        for (let index = 1; index < points.length; index += 1) {
          const start = points[index - 1];
          const end = points[index];
          const segmentLength = Math.abs(end.x - start.x) + Math.abs(end.y - start.y);
          if (distance + segmentLength >= target) {
            const ratio = segmentLength ? (target - distance) / segmentLength : 0;
            return {
              x: start.x + (end.x - start.x) * ratio,
              y: start.y + (end.y - start.y) * ratio
            };
          }
          distance += segmentLength;
        }
        return points[points.length - 1] || { x: 0, y: 0 };
      }

      function cubicPoint(p0, p1, p2, p3, t) {
        const i = 1 - t;
        return {
          x: i ** 3 * p0.x + 3 * i ** 2 * t * p1.x + 3 * i * t ** 2 * p2.x + t ** 3 * p3.x,
          y: i ** 3 * p0.y + 3 * i ** 2 * t * p1.y + 3 * i * t ** 2 * p2.y + t ** 3 * p3.y
        };
      }

      function cubicPath(start, end, fromSide, toSide) {
        const { c1, c2 } = cubicControlPoints(start, end, fromSide, toSide);
        return `M ${start.x} ${start.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${end.x} ${end.y}`;
      }

      function cubicControlPoints(start, end, fromSide, toSide) {
        const sourceDir = DIRS[fromSide] || { x: 0, y: 0 };
        const targetDir = DIRS[toSide] || { x: 0, y: 0 };
        const dx = Math.abs(end.x - start.x);
        const dy = Math.abs(end.y - start.y);
        const distance = Math.max(26, Math.min(82, Math.max(dx, dy) * .22));
        const c1 = {
          x: start.x + sourceDir.x * distance,
          y: start.y + sourceDir.y * distance
        };
        const c2 = {
          x: end.x + targetDir.x * distance,
          y: end.y + targetDir.y * distance
        };
        return { c1, c2 };
      }

      function showPalette(nodeId, side) {
        closePalette();
        const node = findNode(nodeId);
        if (!node) return;
        const plan = portPlan(node, side);
        if (!plan.enabled) {
          setStatus(plan.title);
          return;
        }
        const point = portPoint(node, side);
        const client = clientPointFromStage(point.x, point.y);
        const viewportRect = viewport.getBoundingClientRect();
        const palette = document.createElement("div");
        palette.className = "mini-palette";
        palette.dataset.nodeId = nodeId;
        palette.dataset.side = side;
        palette.style.left = `${Math.min(Math.max(client.x - viewportRect.left, 58), viewportRect.width - 58)}px`;
        palette.style.top = `${Math.min(Math.max(client.y - viewportRect.top, 50), viewportRect.height - 50)}px`;
        palette.innerHTML = isUpwardDiagram()
          ? `
            <button class="mini-button" data-action="${isCrtDiagram() ? "crt" : "stt"}" title="${isCrtDiagram() ? "CRTエンティティを作成" : "S&T項目を作成"}" aria-label="${isCrtDiagram() ? "CRTエンティティを作成" : "S&T項目を作成"}">
              <span class="shape-icon ${isCrtDiagram() ? "crt" : "stt"}" aria-hidden="true"></span>
            </button>
            <button class="mini-button" data-action="connect" title="接続を開始" aria-label="接続を開始">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"></path>
                <path d="M14 11a5 5 0 0 0-7.1 0l-2 2A5 5 0 0 0 12 20.1l1.1-1.1"></path>
              </svg>
            </button>
          `
          : `
            <button class="mini-button" data-action="artifact" title="成果物を作成" aria-label="成果物を作成">
              <span class="shape-icon artifact" aria-hidden="true"></span>
            </button>
            <button class="mini-button" data-action="process" title="プロセスを作成" aria-label="プロセスを作成">
              <span class="shape-icon process" aria-hidden="true"></span>
            </button>
            <button class="mini-button" data-action="connect" title="接続を開始" aria-label="接続を開始">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"></path>
                <path d="M14 11a5 5 0 0 0-7.1 0l-2 2A5 5 0 0 0 12 20.1l1.1-1.1"></path>
              </svg>
            </button>
          `;
        const artifactButton = palette.querySelector('[data-action="artifact"]');
        const processButton = palette.querySelector('[data-action="process"]');
        const sttButton = palette.querySelector('[data-action="stt"]');
        const crtButton = palette.querySelector('[data-action="crt"]');
        const connectButton = palette.querySelector('[data-action="connect"]');
        if (artifactButton) {
          artifactButton.disabled = plan.validType !== "artifact";
          artifactButton.title = artifactButton.disabled ? "この接続では成果物を選べません" : "成果物を作成";
        }
        if (processButton) {
          processButton.disabled = plan.validType !== "process";
          processButton.title = processButton.disabled ? "この接続ではプロセスを選べません" : "プロセスを作成";
        }
        if (sttButton) {
          sttButton.disabled = plan.validType !== "stt";
          sttButton.title = sttButton.disabled ? "この接続ではS&T項目を選べません" : "S&T項目を作成";
        }
        if (crtButton) {
          crtButton.disabled = plan.validType !== "crt";
          crtButton.title = crtButton.disabled ? "この接続ではCRTエンティティを選べません" : "CRTエンティティを作成";
        }
        connectButton.disabled = !plan.connectable;
        connectButton.title = plan.connectable
          ? "既存のオブジェクトへ接続"
          : (isCrtDiagram() ? "左右は同じ結果への原因追加専用です" : (isSttDiagram() ? "左右は同階層項目の追加専用です" : "上下は並列入力の追加専用です"));
        viewport.append(palette);
        state.palette = palette;
      }

      function closePalette() {
        if (state.palette) {
          state.palette.remove();
          state.palette = null;
        }
      }

      function startTitleEdit(nodeId) {
        const node = findNode(nodeId);
        if (!node) return;
        state.selected = { type: "node", id: nodeId };
        state.editingNodeId = nodeId;
        state.editingNodeField = null;
        state.pendingPort = null;
        state.detailVisible = false;
        state.detailEditing = false;
        state.detailEditingNodeId = null;
        closePalette();
        render();
        requestAnimationFrame(() => {
          const input = nodeLayer.querySelector(`[data-title-input="${nodeId}"]`);
          if (input) {
            input.focus();
            input.select();
          }
        });
      }

      function cancelTitleEdit() {
        if (!state.editingNodeId) return;
        state.editingNodeId = null;
        render();
        setStatus("タイトル編集をキャンセル");
      }

      function saveTitleEdit(nodeId) {
        const node = findNode(nodeId || state.editingNodeId);
        if (!node) return;
        if (state.editingNodeId !== node.id) return;
        const input = nodeLayer.querySelector(`[data-title-input="${node.id}"]`);
        const nextText = (input?.value || "").trim();
        if ((node.text || "") === nextText) {
          state.editingNodeId = null;
          render();
          setStatus("タイトルは変更されていません");
          return;
        }
        recordHistory();
        node.text = nextText;
        if (isSttNode(node)) {
          node.stt = normalizeSttFields({ ...(node.stt || {}), id: nextText });
        }
        state.selected = { type: "node", id: node.id };
        state.editingNodeId = null;
        autoLayout();
        render();
        saveState();
        setStatus("タイトルを更新しました");
      }

      function startNodeFieldEdit(nodeId, field) {
        const node = findNode(nodeId);
        if (!node || state.viewMode !== "detail") return;
        if (isCrtNode(node)) return;
        if (isEcNode(node)) return;
        state.selected = { type: "node", id: node.id };
        state.editingNodeId = null;
        state.editingNodeField = { nodeId: node.id, field };
        state.pendingPort = null;
        closePalette();
        render();
        requestAnimationFrame(() => {
          if (field === "statuses") {
            nodeLayer.querySelector("[data-node-status-editor]")?.focus();
          } else {
            const input = nodeLayer.querySelector(`[data-node-field-input="${field}"]`);
            input?.focus();
            input?.select();
          }
        });
      }

      function cancelNodeFieldEdit() {
        if (!state.editingNodeField) return;
        state.editingNodeField = null;
        render();
        setStatus("ノード上の編集をキャンセルしました");
      }

      function saveNodeFieldEdit() {
        const editing = state.editingNodeField;
        if (!editing || editing.field === "statuses") return;
        const node = findNode(editing.nodeId);
        if (!node) {
          state.editingNodeField = null;
          render();
          return;
        }
        const input = nodeLayer.querySelector(`[data-node-field-input="${editing.field}"]`);
        const nextValue = (input?.value || "").trim();
        const currentValue = (node[editing.field] || "").trim();
        state.editingNodeField = null;
        if (currentValue === nextValue) {
          render();
          return;
        }
        recordHistory();
        node[editing.field] = nextValue;
        state.selected = { type: "node", id: node.id };
        render();
        saveState();
        setStatus(editing.field === "owner" ? "担当者を更新しました" : "見積もり期間を更新しました");
      }

      function saveNodeStatusesFromEditor() {
        const editing = state.editingNodeField;
        if (!editing || editing.field !== "statuses") return;
        const node = findNode(editing.nodeId);
        if (!node) return;
        const nextStatuses = normalizeStatuses([...nodeLayer.querySelectorAll("[data-node-status-editor]")]
          .filter(input => input.checked)
          .map(input => input.dataset.nodeStatusEditor));
        if (sameList(normalizeStatuses(node.statuses), nextStatuses)) return;
        recordHistory();
        node.statuses = nextStatuses;
        state.selected = { type: "node", id: node.id };
        render();
        saveState();
        setStatus("状況を更新しました");
      }

      function addFromSelected(side) {
        const node = selectedNode();
        if (!node) {
          setStatus("追加元のノードを選択してください");
          return;
        }
        if (state.pendingPort) {
          state.pendingPort = null;
          closePalette();
          render();
        }
        const plan = portPlan(node, side);
        if (!plan.enabled || !plan.validType) {
          setStatus(plan.title || "この方向には追加できません");
          return;
        }
        addFromPort(node.id, side, plan.validType);
      }

      function selectNodeInDirection(direction) {
        const current = selectedNode();
        if (!current || !isNodeVisibleInCurrentMode(current)) {
          const firstVisible = visibleNodes()[0];
          if (firstVisible) {
            state.selected = { type: "node", id: firstVisible.id };
            render();
            setStatus("ノードを選択しました");
          }
          return;
        }

        const linked = linkedCandidatesInDirection(current, direction);
        const candidates = linked.length ? linked : spatialCandidatesInDirection(current, direction);
        if (!candidates.length) {
          setStatus("その方向にノードがありません");
          return;
        }

        const next = candidates
          .map(node => ({ node, score: directionalScore(current, node, direction, linked.includes(node)) }))
          .sort((a, b) => a.score - b.score || a.node.id.localeCompare(b.node.id))[0].node;

        state.selected = { type: "node", id: next.id };
        state.pendingPort = null;
        state.editingNodeId = null;
        closePalette();
        render();
        setStatus(`${displayText(next)} を選択`);
      }

      function linkedCandidatesInDirection(current, direction) {
        if (isUpwardDiagram()) {
          if (direction === "up") {
            return state.edges
              .filter(edge => edge.from === current.id)
              .map(edge => findNode(edge.to))
              .filter(node => node && isNodeVisibleInCurrentMode(node));
          }
          if (direction === "down") {
            return state.edges
              .filter(edge => edge.to === current.id)
              .map(edge => findNode(edge.from))
              .filter(node => node && isNodeVisibleInCurrentMode(node));
          }
          return [];
        }
        if (direction === "right") {
          return state.edges
            .filter(edge => edge.from === current.id)
            .map(edge => findNode(edge.to))
            .filter(node => node && isNodeVisibleInCurrentMode(node));
        }
        if (direction === "left") {
          return state.edges
            .filter(edge => edge.to === current.id)
            .map(edge => findNode(edge.from))
            .filter(node => node && isNodeVisibleInCurrentMode(node));
        }
        return [];
      }

      function spatialCandidatesInDirection(current, direction) {
        return visibleNodes().filter(node => {
          if (node.id === current.id) return false;
          const dx = node.x - current.x;
          const dy = node.y - current.y;
          if (direction === "right") return dx > 20;
          if (direction === "left") return dx < -20;
          if (direction === "down") return dy > 20;
          return dy < -20;
        });
      }

      function directionalScore(current, node, direction, linked) {
        const dx = node.x - current.x;
        const dy = node.y - current.y;
        const primary = direction === "left" || direction === "right" ? Math.abs(dx) : Math.abs(dy);
        const secondary = direction === "left" || direction === "right" ? Math.abs(dy) : Math.abs(dx);
        return primary + secondary * 1.8 + (linked ? -1000 : 0);
      }

      function renderDetailPanel() {
        const node = selectedNode();
        if (!node || !isNodeVisibleInCurrentMode(node) || !state.detailVisible) {
          detailPanel.classList.remove("open", "editing", "stt-detail", "crt-detail", "ec-detail");
          return;
        }

        detailPanel.classList.add("open");
        const editing = state.detailEditing && state.detailEditingNodeId === node.id;
        detailPanel.classList.toggle("editing", editing);
        detailPanel.classList.toggle("stt-detail", isSttNode(node));
        detailPanel.classList.toggle("crt-detail", isCrtNode(node));
        detailPanel.classList.toggle("ec-detail", isEcNode(node));
        detailTypeBadge.className = `type-badge ${node.type}`;
        detailTypeBadge.textContent = nodeTypeLabel(node.type);
        detailTitle.textContent = isEcNode(node) ? ecNodeTitle(node) : displayText(node);
        if (editing && !isEcNode(node) && !isCrtNode(node)) {
          detailTitle.setAttribute("contenteditable", "true");
          detailTitle.setAttribute("spellcheck", "false");
        } else {
          detailTitle.removeAttribute("contenteditable");
          detailTitle.removeAttribute("spellcheck");
        }
        detailMetaView.innerHTML = renderDetailMeta(node, editing);
        detailMarkdownView.innerHTML = (isSttNode(node) || isCrtNode(node) || isEcNode(node)) ? "" : renderMarkdown(node.detail || "");

        if (editing) {
          detailMarkdownEditor.value = node.detail || "";
        } else {
          syncDetailEditorFields(node);
        }
      }

      function openDetailPanel(nodeId) {
        if (!findNode(nodeId)) return;
        state.selected = { type: "node", id: nodeId };
        state.detailVisible = true;
        state.detailEditing = false;
        state.detailEditingNodeId = null;
        state.pendingPort = null;
        state.editingNodeField = null;
        closePalette();
        render();
        setStatus("詳細を表示");
      }

      function closeDetailPanel() {
        state.detailVisible = false;
        state.detailEditing = false;
        state.detailEditingNodeId = null;
        renderDetailPanel();
      }

      function detailInlineValue(field) {
        if (field === "owner") {
          return (detailMetaView.querySelector("[data-detail-owner-input]")?.value || "").trim();
        }
        return (detailMetaView.querySelector(`[data-detail-inline="${field}"]`)?.textContent || "").trim();
      }

      function selectElementContents(element) {
        if (!element || !document.createRange || !window.getSelection) return;
        const range = document.createRange();
        range.selectNodeContents(element);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function startDetailEdit(focusTarget = "detail") {
        const node = selectedNode();
        if (!node) return;
        state.detailVisible = true;
        state.detailEditing = true;
        state.detailEditingNodeId = node.id;
        syncDetailEditorFields(node);
        renderDetailPanel();
        requestAnimationFrame(() => {
          if (isCrtNode(node)) {
            const target = focusTarget === "color"
              ? detailMetaView.querySelector("[data-crt-field='color']")
              : detailMetaView.querySelector("[data-crt-field='text']");
            target?.focus();
            if (target?.select) target.select();
          } else if (isEcNode(node)) {
            const target = detailMetaView.querySelector("[data-ec-field='text']");
            target?.focus();
            target?.select();
          } else if (focusTarget === "title") {
            detailTitle.focus();
            selectElementContents(detailTitle);
          } else if (isSttNode(node)) {
            const target = detailMetaView.querySelector(`[data-stt-field="${focusTarget}"]`) ||
              detailMetaView.querySelector("[data-stt-field]");
            target?.focus();
            target?.select();
          } else if (focusTarget === "estimate" || focusTarget === "owner") {
            const target = focusTarget === "owner"
              ? detailMetaView.querySelector("[data-detail-owner-input]")
              : detailMetaView.querySelector(`[data-detail-inline="${focusTarget}"]`);
            target?.focus();
            if (target?.select) target.select();
            else selectElementContents(target);
          } else if (focusTarget === "status") {
            detailMetaView.querySelector("[data-status-editor]")?.focus();
          } else {
            detailMarkdownEditor.focus();
          }
        });
      }

      function cancelDetailEdit() {
        state.detailEditing = false;
        state.detailEditingNodeId = null;
        renderDetailPanel();
        setStatus("詳細編集をキャンセル");
      }

      function saveDetailEdit() {
        const node = findNode(state.detailEditingNodeId) || selectedNode();
        if (!node) return;
        if (isCrtNode(node)) {
          const nextValues = readCrtDetailValues();
          if ((node.text || "") === nextValues.text && normalizeCrtColor(node.color) === nextValues.color) {
            state.detailEditing = false;
            state.detailEditingNodeId = null;
            renderDetailPanel();
            setStatus("詳細は変更されていません");
            return;
          }
          recordHistory();
          node.text = nextValues.text;
          node.color = nextValues.color;
          state.selected = { type: "node", id: node.id };
          state.detailVisible = true;
          state.detailEditing = false;
          state.detailEditingNodeId = null;
          autoLayout();
          render();
          saveState();
          setStatus("CRTエンティティを保存しました");
          return;
        }
        if (isEcNode(node)) {
          const nextText = readEcDetailValue();
          if ((node.text || "") === nextText) {
            state.detailEditing = false;
            state.detailEditingNodeId = null;
            renderDetailPanel();
            setStatus("詳細は変更されていません");
            return;
          }
          recordHistory();
          node.text = nextText;
          state.selected = { type: "node", id: node.id };
          state.detailVisible = true;
          state.detailEditing = false;
          state.detailEditingNodeId = null;
          autoLayout();
          render();
          saveState();
          setStatus("ECを保存しました");
          return;
        }
        const nextText = (detailTitle.textContent || "").trim();
        if (isSttNode(node)) {
          const nextStt = readSttDetailValues();
          nextStt.id = nextText;
          if ((node.text || "") === nextText && sameSttFields(node.stt || node, nextStt)) {
            state.detailEditing = false;
            state.detailEditingNodeId = null;
            renderDetailPanel();
            setStatus("詳細は変更されていません");
            return;
          }
          recordHistory();
          node.text = nextText;
          node.stt = nextStt;
          state.selected = { type: "node", id: node.id };
          state.detailVisible = true;
          state.detailEditing = false;
          state.detailEditingNodeId = null;
          render();
          saveState();
          setStatus("S&T項目を保存しました");
          return;
        }
        const nextEstimate = detailInlineValue("estimate");
        const nextOwner = detailInlineValue("owner");
        const nextStatuses = readStatusEditorValues();
        const nextDetail = detailMarkdownEditor.value.replace(/\r\n/g, "\n").trim();
        if (
          (node.text || "") === nextText &&
          (node.estimate || "") === nextEstimate &&
          (node.owner || "") === nextOwner &&
          sameList(normalizeStatuses(node.statuses), nextStatuses) &&
          (node.detail || "") === nextDetail
        ) {
          state.detailEditing = false;
          state.detailEditingNodeId = null;
          renderDetailPanel();
          setStatus("詳細は変更されていません");
          return;
        }
        recordHistory();
        node.text = nextText;
        node.estimate = nextEstimate;
        node.owner = nextOwner;
        node.statuses = nextStatuses;
        node.detail = nextDetail;
        state.selected = { type: "node", id: node.id };
        state.detailVisible = true;
        state.detailEditing = false;
        state.detailEditingNodeId = null;
        render();
        saveState();
        setStatus("詳細を保存しました");
      }

      function openEditor(nodeId) {
        const node = findNode(nodeId);
        if (!node) return;
        state.editingNodeId = nodeId;
        editorText.value = node.text;
        editorDialog.classList.add("open");
        requestAnimationFrame(() => {
          editorText.focus();
          editorText.select();
        });
      }

      function closeEditor() {
        state.editingNodeId = null;
        editorDialog.classList.remove("open");
      }

      function saveEditor(clear = false) {
        const node = findNode(state.editingNodeId);
        if (!node) {
          closeEditor();
          return;
        }
        const nextText = clear ? "" : editorText.value.trim();
        if (node.text === nextText) {
          closeEditor();
          setStatus("文字は変更されていません");
          return;
        }
        recordHistory();
        node.text = nextText;
        closeEditor();
        render();
        saveState();
        setStatus("文字を更新");
      }

      function updateHint() {
        if (state.pendingPort) {
          const node = findNode(state.pendingPort.nodeId);
          if (isCrtDiagram()) {
            setHint(state.pendingPort.mode === "source"
              ? `${displayText(node)} の結果を選択中。候補は上のポートです。`
              : `${displayText(node)} の原因を選択中。候補は下のポートです。`
            );
            return;
          }
          if (isSttDiagram()) {
            setHint(state.pendingPort.mode === "source"
              ? `${displayText(node)} の参照先を選択中。候補は下ポートだけです。`
              : `${displayText(node)} の参照元を選択中。候補は上ポートだけです。`
            );
            return;
          }
          setHint(state.pendingPort.mode === "source"
            ? `${displayText(node)} の接続先を選択中。候補は左ポートだけです。`
            : `${displayText(node)} の接続元を選択中。候補は右ポートだけです。`
          );
          return;
        }
        setHint(isEcDiagram()
          ? "中央クリックで内容を編集、ダブルクリックで詳細欄を開きます。ECの構造は固定です。"
          : (isCrtDiagram()
            ? "中央クリックで課題・状況を編集、ダブルクリックで色や詳細を編集できます。上に結果、下に原因を追加します。"
            : (isSttDiagram()
              ? "中央クリックでID編集、ダブルクリックでS&T項目の詳細を編集できます。上に参照先、下に参照元を追加します。"
              : "中央クリックでタイトル編集、周辺クリックで選択、ダブルクリックで詳細を表示します。")));
      }

      function downloadJson() {
        const blob = new Blob([JSON.stringify(graphPayload(), null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${DIAGRAM_TYPES[state.diagramType].filePrefix}-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.append(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        setStatus("JSONを保存");
      }

      function openJsonFilePicker() {
        jsonFileInput.value = "";
        jsonFileInput.click();
      }

      function importJsonFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || ""));
            const graph = normalizeGraphData(parsed);
            recordHistory();
            applyGraphData(graph);
            setStatus(`${file.name} を読み込みました`);
          } catch (error) {
            setStatus(error.message || "JSONを読み込めませんでした");
          }
        };
        reader.onerror = () => {
          setStatus("JSONファイルを読み込めませんでした");
        };
        reader.readAsText(file);
      }

      function handleCommand(command) {
        if (command === "undo") {
          undo();
        } else if (command === "redo") {
          redo();
        } else if (command === "layout") {
          recordHistory();
          autoLayout();
          render();
          saveState();
          setStatus("自動配列しました");
        } else if (command === "fit") {
          centerOnGraph();
          setStatus("全体を表示");
        } else if (command === "delete") {
          deleteSelection();
        } else if (command === "download") {
          downloadJson();
        } else if (command === "upload") {
          openJsonFilePicker();
        } else if (command === "reset") {
          clearAll();
        } else if (command === "zoom-in") {
          setZoom(state.zoom * 1.15);
        } else if (command === "zoom-out") {
          setZoom(state.zoom / 1.15);
        }
      }

      document.addEventListener("click", event => {
        clearCenterClickTimer();

        const commandButton = event.target.closest("[data-command]");
        if (commandButton) {
          handleCommand(commandButton.dataset.command);
          return;
        }

        const modeButton = event.target.closest("[data-mode]");
        if (modeButton) {
          setViewMode(modeButton.dataset.mode);
          return;
        }

        const addRootButton = event.target.closest("[data-add-root]");
        if (addRootButton) {
          addRoot(addRootButton.dataset.addRoot);
          return;
        }

        const editorAction = event.target.closest("[data-editor]");
        if (editorAction) {
          const action = editorAction.dataset.editor;
          if (action === "save") saveEditor(false);
          if (action === "clear") saveEditor(true);
          if (action === "cancel" || action === "close") closeEditor();
          return;
        }

        const detailAction = event.target.closest("[data-detail]");
        if (detailAction) {
          const action = detailAction.dataset.detail;
          if (action === "edit") startDetailEdit();
          if (action === "save") saveDetailEdit();
          if (action === "cancel") cancelDetailEdit();
          if (action === "close") closeDetailPanel();
          return;
        }

        const editableDetail = event.target.closest(".detail-view, .detail-title");
        if (editableDetail && state.detailVisible && !state.detailEditing) {
          const metaField = event.target.closest("[data-meta-field]")?.dataset.metaField;
          startDetailEdit(editableDetail.classList.contains("detail-title") ? "title" : (metaField || "detail"));
          setStatus("詳細を編集中です");
          return;
        }

        const paletteButton = event.target.closest(".mini-button");
        if (paletteButton && state.palette) {
          if (paletteButton.disabled) return;
          const action = paletteButton.dataset.action;
          const { nodeId, side } = state.palette.dataset;
          if (action === "connect") startConnection(nodeId, side);
          if (action === "artifact" || action === "process" || action === "stt" || action === "crt") addFromPort(nodeId, side, action);
          return;
        }

        const port = event.target.closest(".port");
        if (port) {
          event.stopPropagation();
          const { nodeId, side } = port.dataset;
          const node = findNode(nodeId);
          if (!isPortEnabled(node, side)) {
            setStatus(state.pendingPort ? "接続できる候補だけ選択できます" : portPlan(node, side).title);
            return;
          }
          if (state.pendingPort) {
            completeConnection(nodeId, side);
            return;
          }
          state.selected = { type: "node", id: nodeId };
          render();
          showPalette(nodeId, side);
          setStatus(portPlan(node, side).title);
          return;
        }

        if (event.target.closest(".title-editor")) {
          return;
        }

        if (event.target.closest(".node-field-editor")) {
          return;
        }

        const nodeEl = event.target.closest(".node");
        if (nodeEl) {
          const id = nodeEl.dataset.nodeId;
          clearCenterClickTimer();
          const nodeField = nodeDetailFieldFromClick(nodeEl, event);
          if (nodeField) {
            startNodeFieldEdit(id, nodeField);
            setStatus(nodeField === "statuses" ? "状況を選択できます" : (nodeField === "owner" ? "担当者を編集中です" : "見積もり期間を編集中です"));
          } else if (isNodeCenterClick(nodeEl, event)) {
            centerClickTimer = setTimeout(() => {
              centerClickTimer = null;
              startTitleEdit(id);
              setStatus("タイトルを編集中です");
            }, 260);
          } else {
            state.selected = { type: "node", id };
            if (state.editingNodeId !== id) state.editingNodeId = null;
            state.editingNodeField = null;
            state.detailVisible = false;
            state.detailEditing = false;
            state.detailEditingNodeId = null;
            closePalette();
            render();
            setStatus("ノードを選択しました。ダブルクリックで詳細を表示します");
          }
          return;
        }

        const edgeHit = event.target.closest(".edge-hit");
        if (edgeHit) {
          selectEdge(edgeHit.dataset.edgeId);
          return;
        }

        if (!event.target.closest(".dialog, .detail-panel")) {
          closePalette();
          if (state.editingNodeField) {
            state.editingNodeField = null;
            render();
          }
          if (state.pendingPort) {
            state.pendingPort = null;
            render();
            setStatus("接続をキャンセル");
          }
        }
      });

      jsonFileInput.addEventListener("change", event => {
        importJsonFile(event.target.files?.[0]);
      });

      diagramTypeSelect.addEventListener("change", event => {
        setDiagramType(event.target.value);
      });

      nodeTextSizeSlider.addEventListener("input", event => {
        setNodeTextSize(event.target.value);
      });

      nodeTextSizeSlider.addEventListener("change", event => {
        setNodeTextSize(event.target.value, true);
      });

      document.addEventListener("change", event => {
        if (event.target.closest("[data-node-status-editor]")) {
          saveNodeStatusesFromEditor();
        }
      });

      document.addEventListener("dblclick", event => {
        if (event.target.closest(".port, .mini-palette, button, textarea, input, .detail-panel")) return;
        const nodeEl = event.target.closest(".node");
        if (!nodeEl) return;
        clearCenterClickTimer();
        event.preventDefault();
        openDetailPanel(nodeEl.dataset.nodeId);
      });

      nodeLayer.addEventListener("keydown", event => {
        const nodeEl = event.target.closest(".node");
        if (!nodeEl) return;
        if (event.key === " ") {
          event.preventDefault();
          state.selected = { type: "node", id: nodeEl.dataset.nodeId };
          render();
          setStatus("ノードを選択しました。F2でタイトル編集、ダブルクリックで詳細を表示します");
        }
      });

      document.addEventListener("keydown", event => {
        if (editorDialog.classList.contains("open")) {
          if (event.key === "Escape") {
            event.preventDefault();
            closeEditor();
          }
          if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
            event.preventDefault();
            saveEditor(false);
          }
          return;
        }

        if (isTextEditingTarget(event.target)) {
          if (event.target.closest(".node-field-editor") && event.key === "Enter") {
            event.preventDefault();
            saveNodeFieldEdit();
          } else if (event.target.closest(".node-field-editor") && event.key === "Escape") {
            event.preventDefault();
            cancelNodeFieldEdit();
          } else if (isTitleEditingTarget(event.target) && (event.ctrlKey || event.metaKey) && event.key === "Enter") {
            event.preventDefault();
            saveTitleEdit(state.editingNodeId);
          } else if (isTitleEditingTarget(event.target) && event.key === "Escape") {
            event.preventDefault();
            cancelTitleEdit();
          } else if (state.detailEditing && (event.ctrlKey || event.metaKey) && event.key === "Enter") {
            event.preventDefault();
            saveDetailEdit();
          } else if (state.detailEditing && event.key === "Escape") {
            event.preventDefault();
            cancelDetailEdit();
          }
          return;
        }

        const key = event.key.toLowerCase();
        if ((event.ctrlKey || event.metaKey) && key === "z") {
          event.preventDefault();
          if (event.shiftKey) {
            redo();
          } else {
            undo();
          }
          return;
        }
        if ((event.ctrlKey || event.metaKey) && key === "y") {
          event.preventDefault();
          redo();
          return;
        }

        if (event.key === "F2") {
          const node = selectedNode();
          if (node) {
            event.preventDefault();
            startTitleEdit(node.id);
          }
          return;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          addFromSelected(event.shiftKey ? "top" : "bottom");
          return;
        }

        if (event.key === "Tab") {
          event.preventDefault();
          addFromSelected(event.shiftKey ? "left" : "right");
          return;
        }

        const arrowDirections = {
          ArrowUp: "up",
          ArrowRight: "right",
          ArrowDown: "down",
          ArrowLeft: "left"
        };
        if (arrowDirections[event.key]) {
          event.preventDefault();
          selectNodeInDirection(arrowDirections[event.key]);
          return;
        }

        if (event.key === "Delete" || event.key === "Backspace") {
          event.preventDefault();
          deleteSelection();
        }
        if (event.key === "Escape") {
          state.pendingPort = null;
          closePalette();
          render();
          setStatus("操作をキャンセル");
        }
      });

      viewport.addEventListener("pointerdown", event => {
        if (event.button !== 0) return;
        if (event.target.closest(".node, .port, .mini-palette, .crt-and-editor, button, select")) return;
        panGesture = {
          pointerId: event.pointerId,
          x: event.clientX,
          y: event.clientY,
          panX: state.pan.x,
          panY: state.pan.y
        };
        viewport.classList.add("is-panning");
        viewport.setPointerCapture(event.pointerId);
      });

      viewport.addEventListener("pointermove", event => {
        if (!panGesture || event.pointerId !== panGesture.pointerId) return;
        state.pan.x = panGesture.panX + event.clientX - panGesture.x;
        state.pan.y = panGesture.panY + event.clientY - panGesture.y;
        updateTransform();
        closePalette();
      });

      viewport.addEventListener("pointerup", event => {
        if (!panGesture || event.pointerId !== panGesture.pointerId) return;
        panGesture = null;
        viewport.classList.remove("is-panning");
      });

      viewport.addEventListener("wheel", event => {
        event.preventDefault();
        setZoom(state.zoom * (event.deltaY > 0 ? .92 : 1.08), { x: event.clientX, y: event.clientY });
        closePalette();
      }, { passive: false });

      editorDialog.addEventListener("click", event => {
        if (event.target === editorDialog) closeEditor();
      });

      window.addEventListener("resize", () => {
        updateTransform();
        closePalette();
      });

      loadState();
      autoLayout();
      render();
      requestAnimationFrame(centerOnGraph);
      setStatus(isEcDiagram() ? "ECを開きました" : (isCrtDiagram() ? "CRTを開きました" : (isSttDiagram() ? "S&Tを開きました" : "最初の成果物を配置しました")));
    })();
  </script>
</body>
</html>
