<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PFD Sketch</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef1f4;
      --panel: #fbfcfd;
      --panel-2: #f4f7f8;
      --ink: #172029;
      --muted: #66717c;
      --line: #56616c;
      --line-soft: #c7ced5;
      --accent: #177b84;
      --accent-2: #b95f21;
      --artifact: #fffdf8;
      --artifact-border: #bf8c32;
      --artifact-glow: rgba(191, 140, 50, .18);
      --process: #f0fffb;
      --process-border: #188773;
      --process-glow: rgba(24, 135, 115, .18);
      --stt: #f8fbff;
      --stt-border: #496b9e;
      --stt-glow: rgba(73, 107, 158, .18);
      --danger: #b4232f;
      --shadow: 0 14px 34px rgba(22, 31, 40, .16);
      --toolbar-h: 58px;
      --radius: 8px;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      display: grid;
      grid-template-rows: var(--toolbar-h) 1fr;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid #d9dee3;
      background: rgba(251, 252, 253, .94);
      backdrop-filter: blur(12px);
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 176px;
      white-space: nowrap;
    }

    .brand strong {
      font-size: 18px;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 40px;
      padding-inline: 8px;
      border-left: 1px solid #d9dee3;
    }

    .diagram-select {
      height: 34px;
      min-width: 112px;
      border: 1px solid #b9c4cc;
      border-radius: 8px;
      padding: 0 30px 0 10px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .mode-group {
      gap: 0;
    }

    .mode-button {
      height: 34px;
      min-width: 78px;
      border: 1px solid #b9c4cc;
      border-right-width: 0;
      background: #fff;
      color: #47515b;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .mode-button:first-child {
      border-radius: 8px 0 0 8px;
    }

    .mode-button:last-child {
      border-right-width: 1px;
      border-radius: 0 8px 8px 0;
    }

    .mode-button.active {
      border-color: var(--accent);
      background: #e9f7f7;
      color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(23, 123, 132, .18);
    }

    .detail-tools {
      display: none;
      gap: 10px;
      min-width: 0;
    }

    .detail-tools.visible {
      display: flex;
    }

    .metric-strip {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .metric-pill {
      display: inline-grid;
      gap: 1px;
      min-width: 78px;
      min-height: 34px;
      padding: 4px 8px;
      border: 1px solid #cbd5dc;
      border-radius: 8px;
      background: #fff;
    }

    .metric-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 750;
      line-height: 1.1;
      white-space: nowrap;
    }

    .metric-value {
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.1;
      white-space: nowrap;
    }

    .text-size-control {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 158px;
      color: #46535d;
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .text-size-control input {
      width: 86px;
      accent-color: var(--accent);
    }

    .text-size-toolbar {
      border-left: 0;
      padding-inline: 0 8px;
    }

    .text-size-value {
      width: 34px;
      color: var(--muted);
      font-size: 11px;
      text-align: right;
    }

    .toolbar-spacer {
      flex: 1;
    }

    .icon-button,
    .shape-button,
    .mini-button,
    .dialog-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #cfd6dc;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      user-select: none;
      transition: transform .14s ease, border-color .14s ease, background .14s ease, box-shadow .14s ease;
    }

    .icon-button:disabled,
    .shape-button:disabled,
    .dialog-button:disabled {
      color: #a0a9b2;
      background: #f1f3f5;
      border-color: #d7dde2;
      box-shadow: none;
      cursor: not-allowed;
      opacity: .62;
    }

    .icon-button {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }

    .shape-button {
      min-width: 86px;
      height: 36px;
      gap: 8px;
      padding: 0 11px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 650;
    }

    .icon-button:not(:disabled):hover,
    .shape-button:not(:disabled):hover,
    .mini-button:not(:disabled):hover,
    .dialog-button:not(:disabled):hover {
      border-color: #9aa8b3;
      background: #f8fbfc;
      box-shadow: 0 5px 18px rgba(22, 31, 40, .12);
    }

    .icon-button:not(:disabled):active,
    .shape-button:not(:disabled):active,
    .mini-button:not(:disabled):active,
    .dialog-button:not(:disabled):active {
      transform: translateY(1px);
    }

    .icon-button svg,
    .mini-button svg,
    .dialog-button svg {
      width: 18px;
      height: 18px;
      pointer-events: none;
    }

    .shape-icon {
      width: 23px;
      height: 16px;
      border: 2px solid currentColor;
      background: #fff;
      flex: 0 0 auto;
    }

    .shape-icon.artifact {
      border-radius: 4px;
      color: var(--artifact-border);
    }

    .shape-icon.process {
      border-radius: 999px;
      color: var(--process-border);
    }

    .shape-icon.stt {
      width: 24px;
      height: 17px;
      border-radius: 3px;
      color: var(--stt-border);
      box-shadow: inset 0 -5px 0 rgba(73, 107, 158, .12);
    }

    .shape-icon.crt {
      width: 24px;
      height: 17px;
      border-radius: 3px;
      color: #435b73;
      box-shadow: inset 0 -5px 0 rgba(67, 91, 115, .14);
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-width: 190px;
      max-width: min(42vw, 430px);
      min-height: 28px;
      padding: 4px 9px;
      border: 1px solid #dce2e7;
      border-radius: 8px;
      color: var(--muted);
      background: var(--panel-2);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .app {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(#dfe5ea 1px, transparent 1px),
        linear-gradient(90deg, #dfe5ea 1px, transparent 1px),
        radial-gradient(circle at 15% 14%, rgba(23, 123, 132, .07), transparent 28%),
        radial-gradient(circle at 86% 82%, rgba(185, 95, 33, .07), transparent 30%),
        var(--bg);
      background-size: 28px 28px, 28px 28px, auto, auto, auto;
    }

    .viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: none;
      cursor: grab;
    }

    .viewport.is-panning {
      cursor: grabbing;
    }

    .stage {
      position: absolute;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      transform-origin: 0 0;
    }

    .edges {
      position: absolute;
      left: -5000px;
      top: -5000px;
      width: 10000px;
      height: 10000px;
      overflow: visible;
      pointer-events: auto;
      z-index: 1;
    }

    .edge {
      fill: none;
      stroke: var(--line);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .edge.ghost {
      stroke: var(--accent);
      stroke-dasharray: 8 7;
      opacity: .82;
    }

    .edge-hit {
      fill: none;
      pointer-events: stroke;
      stroke: rgba(255, 255, 255, .01);
      stroke-width: 28;
      cursor: pointer;
    }

    .edge.selected {
      stroke: var(--accent-2);
      stroke-width: 3.5;
    }

    .edge.critical {
      stroke: #d32832;
      stroke-width: 3.7;
    }

    .edge.conflict {
      stroke: #c93434;
      stroke-width: 3.1;
      stroke-linejoin: miter;
    }

    .edge.critical.selected {
      stroke: #d32832;
      stroke-width: 4.4;
    }

    .arrow {
      fill: var(--line);
    }

    .arrow.selected {
      fill: var(--accent-2);
    }

    .arrow.critical {
      fill: #d32832;
    }

    .node-layer {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 2;
      pointer-events: none;
    }

    .edge-control-layer {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 4;
      pointer-events: none;
    }

    .edge-handle {
      position: absolute;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 1px solid #9aa8b3;
      border-radius: 999px;
      background: rgba(255, 255, 255, .96);
      color: var(--line);
      box-shadow: 0 7px 18px rgba(22, 31, 40, .18);
      cursor: pointer;
      pointer-events: auto;
      transform: translate(-50%, -50%);
      transition: background .14s ease, border-color .14s ease, color .14s ease, box-shadow .14s ease;
    }

    .edge-handle:hover,
    .edge-handle.selected {
      border-color: var(--accent-2);
      color: var(--accent-2);
      box-shadow: 0 0 0 5px rgba(185, 95, 33, .14), 0 8px 20px rgba(22, 31, 40, .2);
    }

    .edge-handle.selected {
      background: #fff7f1;
    }

    .edge-handle svg {
      width: 15px;
      height: 15px;
      pointer-events: none;
    }

    .crt-and-node {
      position: absolute;
      display: grid;
      place-items: center;
      width: 58px;
      height: 34px;
      border: 2px solid #435b73;
      border-radius: 999px;
      background: #fff;
      color: #435b73;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      transform: translate(-50%, -50%);
      box-shadow: 0 8px 18px rgba(22, 31, 40, .16);
      pointer-events: none;
    }

    .crt-and-editor {
      position: absolute;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px;
      border: 1px solid #cbd5dc;
      border-radius: 8px;
      background: rgba(255, 255, 255, .98);
      box-shadow: 0 8px 20px rgba(22, 31, 40, .16);
      transform: translate(-50%, calc(-100% - 17px));
      pointer-events: auto;
    }

    .crt-and-select {
      width: 108px;
      border: 1px solid #bac4cc;
      border-radius: 6px;
      padding: 4px 6px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
    }

    .crt-edge-delete {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border: 1px solid #d5b5aa;
      border-radius: 6px;
      background: #fff7f3;
      color: #a84d2e;
      cursor: pointer;
    }

    .crt-edge-delete svg {
      width: 14px;
      height: 14px;
      pointer-events: none;
    }

    .node {
      position: absolute;
      display: grid;
      place-items: center;
      width: 150px;
      min-height: 72px;
      padding: 14px 18px;
      color: var(--ink);
      background: #fff;
      border: 2px solid #88949f;
      box-shadow: 0 9px 24px rgba(22, 31, 40, .12);
      transform: translate(-50%, -50%);
      transition: left .25s ease, top .25s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
      cursor: pointer;
      pointer-events: auto;
      user-select: none;
    }

    .node.artifact {
      background: var(--artifact);
      border-color: var(--artifact-border);
      border-radius: 7px;
    }

    .node.process {
      width: 164px;
      min-height: 86px;
      padding-inline: 24px;
      background: var(--process);
      border-color: var(--process-border);
      border-radius: 999px;
    }

    .node.crt {
      width: 238px;
      min-height: 108px;
      padding: 15px 17px;
      place-items: stretch;
      border-color: var(--crt-border, #71808d);
      background: var(--crt-bg, #f8fafb);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(24, 35, 47, .13);
    }

    .node.crt.selected {
      box-shadow: 0 0 0 5px rgba(53, 92, 134, .15), 0 14px 34px rgba(22, 31, 40, .18);
    }

    .node.ec {
      width: 238px;
      min-height: 108px;
      padding: 16px 18px;
      place-items: stretch;
      background: linear-gradient(180deg, #f9fbff 0%, #eef4fb 100%);
      border-color: #5f7ea8;
      border-radius: 8px;
      box-shadow: 0 14px 34px rgba(43, 64, 92, .13);
    }

    .node.ec.assumption {
      width: 228px;
      min-height: 96px;
      padding: 13px 15px;
      border-color: #c8a340;
      border-style: dashed;
      background: linear-gradient(180deg, #fffdf5 0%, #fff7dc 100%);
      box-shadow: 0 10px 24px rgba(119, 87, 20, .12);
    }

    .node.ec.action {
      border-color: #9b625d;
      background: linear-gradient(180deg, #fffafa 0%, #fbefee 100%);
    }

    .node.ec.need {
      border-color: #60835e;
      background: linear-gradient(180deg, #f9fff8 0%, #eff8ee 100%);
    }

    .node.stt {
      width: 262px;
      min-height: 152px;
      padding: 11px 12px;
      place-items: stretch;
      background: var(--stt);
      border-color: var(--stt-border);
      border-radius: 7px;
    }

    .node.selected {
      box-shadow: 0 0 0 5px rgba(23, 123, 132, .16), 0 14px 34px rgba(22, 31, 40, .18);
    }

    .node.artifact.selected {
      box-shadow: 0 0 0 5px var(--artifact-glow), 0 14px 34px rgba(22, 31, 40, .18);
    }

    .node.process.selected {
      box-shadow: 0 0 0 5px var(--process-glow), 0 14px 34px rgba(22, 31, 40, .18);
    }

    .node.stt.selected {
      box-shadow: 0 0 0 5px var(--stt-glow), 0 14px 34px rgba(22, 31, 40, .18);
    }

    .node.ec.selected {
      box-shadow: 0 0 0 5px rgba(47, 70, 100, .16), 0 14px 34px rgba(22, 31, 40, .18);
    }

    .node.pending-connect {
      box-shadow: 0 0 0 6px rgba(23, 123, 132, .2), 0 14px 34px rgba(22, 31, 40, .2);
    }

    .node-label {
      max-width: 100%;
      min-width: 0;
      text-align: center;
      line-height: 1.32;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      font-size: 14px;
      font-weight: 650;
      pointer-events: none;
    }

    .ec-card {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: stretch;
      justify-content: center;
      pointer-events: none;
    }

    .ec-card-kicker {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #59667a;
      font-size: calc(var(--node-text-size, 16px) * .72);
      font-weight: 700;
      line-height: 1.1;
    }

    .ec-card-code {
      display: inline-grid;
      min-width: calc(var(--node-text-size, 16px) * 1.55);
      height: calc(var(--node-text-size, 16px) * 1.55);
      place-items: center;
      border-radius: 999px;
      background: #2f4664;
      color: #fff;
      font-size: calc(var(--node-text-size, 16px) * .75);
      flex: 0 0 auto;
    }

    .node.ec.assumption .ec-card-code {
      background: #946f12;
    }

    .ec-card-value {
      color: #253145;
      font-size: var(--node-text-size, 16px);
      font-weight: 750;
      line-height: 1.28;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .node.ec.assumption .ec-card-value {
      font-size: calc(var(--node-text-size, 16px) * .9);
      font-weight: 650;
    }

    .ec-card-value.empty {
      color: #7c8792;
      font-weight: 600;
    }

    .crt-card {
      display: grid;
      align-content: center;
      gap: 9px;
      min-height: 100%;
      pointer-events: none;
    }

    .crt-card-label {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #566370;
      font-size: calc(var(--node-text-size, 16px) * .72);
      font-weight: 760;
      line-height: 1.15;
    }

    .crt-card-swatch {
      width: calc(var(--node-text-size, 16px) * .92);
      height: calc(var(--node-text-size, 16px) * .92);
      border: 1px solid var(--crt-border, #71808d);
      border-radius: 999px;
      background: var(--crt-accent, #fff);
      flex: 0 0 auto;
    }

    .crt-card-value {
      color: #253145;
      font-size: var(--node-text-size, 16px);
      font-weight: 740;
      line-height: 1.3;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .crt-card-value.empty {
      color: #7c8792;
      font-weight: 600;
    }

    .node.detail-mode {
      min-height: 90px;
      padding-block: 24px 22px;
    }

    .node.process.detail-mode {
      min-height: 100px;
      padding-block: 27px 24px;
    }

    .node.stt.detail-mode {
      width: 380px;
      min-height: 260px;
      padding: 12px;
    }

    .node.detail-mode .node-label {
      font-size: var(--node-title-size, 13px);
      line-height: 1.25;
    }

    .node-status-icons {
      position: absolute;
      top: 7px;
      left: 9px;
      display: flex;
      gap: 3px;
      pointer-events: none;
    }

    .node.process .node-status-icons {
      left: 24px;
      top: 9px;
    }

    .status-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--node-status-icon-size, 18px);
      height: var(--node-status-icon-size, 18px);
      border: 1px solid #b8c3cc;
      border-radius: 999px;
      background: rgba(255, 255, 255, .92);
      color: #4d5b66;
    }

    .status-icon svg {
      width: var(--node-status-svg-size, 12px);
      height: var(--node-status-svg-size, 12px);
      stroke-width: 2.4;
    }

    .status-icon.progress {
      border-color: rgba(23, 123, 132, .42);
      background: #e9f7f7;
      color: var(--accent);
    }

    .status-icon.done {
      border-color: rgba(49, 134, 86, .44);
      background: #ecf8f0;
      color: #2b7d4f;
    }

    .status-icon.trouble {
      border-color: rgba(185, 95, 33, .46);
      background: #fff3ea;
      color: var(--accent-2);
    }

    .node-meta-row {
      position: absolute;
      left: 11px;
      right: 11px;
      bottom: 7px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
    }

    .node.process .node-meta-row {
      left: 25px;
      right: 25px;
      bottom: 11px;
    }

    .node-meta {
      min-width: 0;
      max-width: 64px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #52606a;
      font-size: var(--node-meta-size, 10.5px);
      font-weight: 700;
      line-height: 1.1;
    }

    .node-meta.owner {
      text-align: right;
    }

    .node-meta:empty {
      visibility: hidden;
    }

    .node-field-editor {
      position: absolute;
      z-index: 6;
      pointer-events: auto;
    }

    .node-field-editor.estimate {
      left: 9px;
      bottom: 4px;
      width: var(--node-estimate-field-width, 68px);
    }

    .node-field-editor.owner {
      right: 9px;
      bottom: 4px;
      width: var(--node-owner-field-width, 72px);
    }

    .node.process .node-field-editor.estimate {
      left: 23px;
      bottom: 8px;
    }

    .node.process .node-field-editor.owner {
      right: 23px;
      bottom: 8px;
    }

    .node-field-input {
      width: 100%;
      border: 1px solid #aeb8c1;
      border-radius: 6px;
      padding: 2px 4px;
      background: rgba(255, 255, 255, .98);
      color: #34404a;
      font-size: var(--node-meta-size, 10.5px);
      font-weight: 700;
      line-height: 1.2;
      box-shadow: 0 5px 14px rgba(22, 31, 40, .16);
    }

    .node-field-input.owner {
      text-align: right;
    }

    .node-field-input:focus {
      outline: 3px solid rgba(23, 123, 132, .16);
      border-color: var(--accent);
    }

        { id: "progress", label: "進行中" },

      const STATUS_IDS = new Set(STATUS_OPTIONS.map(status => status.id));

      function freshId(prefix) {
        const id = `${prefix}-${nextId}`;
        nextId += 1;
        return id;
      }

      function makeInitialState(diagramType = state.diagramType || "pfd") {
        state.diagramType = DIAGRAM_TYPES[diagramType] ? diagramType : "pfd";

          state.nodes = makeInitialEcNodes();
          state.edges = makeEcEdges();
          state.selected = { type: "node", id: "head" };
          state.pendingPort = null;
          state.editingNodeField = null;

          state.detailVisible = false;
          state.detailEditing = false;
          state.detailEditingNodeId = null;
          return;
        }
        const config = DIAGRAM_TYPES[state.diagramType];
        const root = {
          id: freshId("node"),
          type: config.rootType,
          text: config.rootText,
          detail: "",
          estimate: "",
          owner: "",
          statuses: [],
          color: "None",
          stt: normalizeSttFields({ id: config.rootText }),
          x: 0,
          y: 0,
          gridX: 0,
          gridY: 0
        };
        state.nodes = [root];
        state.edges = [];
        state.selected = { type: "node", id: root.id };
        state.pendingPort = null;
        state.editingNodeField = null;
        state.nodeTextSize = DEFAULT_NODE_TEXT_SIZE;
        state.detailVisible = false;
        state.detailEditing = false;
        state.detailEditingNodeId = null;
      }

      function makeInitialEcNodes() {
        return EC_NODE_DEFS.map(def => ({
          id: def.id,
          type: "ec",
          text: def.text,
          detail: "",
          estimate: "",
          owner: "",
          statuses: [],
          ecRole: def.id,
          ecKind: def.kind,
          x: 0,
          y: 0,
          gridX: 0,
          gridY: 0
        }));
      }

      function makeEcEdges() {
        return EC_EDGE_DEFS.map(edge => ({ ...edge }));
      }

      function normalizeGraphData(parsed) {
        if (!parsed || !Array.isArray(parsed.nodes) || !Array.isArray(parsed.edges) || !parsed.nodes.length) {
          throw new Error("JSONとして読み込めませんでした。");
        }

        const hasSttFields = parsed.nodes.some(node =>
          STT_FIELDS.some(field => field.key in node || field.legacy in node || field.key in (node.stt || {}))
        );
        const hasCrtShape = parsed.nodes.some(node => node.type === "entity" || node.type === "note") &&
          parsed.edges.some(edge => "and" in edge || edge.type === "arrow");
        const ecIds = new Set(parsed.nodes.map(node => String(node.unique_id || node.uid || node.id || "")));
        const hasEcShape = ["head", "left_shoulder", "right_shoulder", "left_hand", "right_hand"].every(id => ecIds.has(id));
        const diagramType = parsed.diagramType === "ec" || hasEcShape
          ? "ec"
          : (parsed.diagramType === "crt" || hasCrtShape
            ? "crt"
            : (parsed.diagramType === "stt" || hasSttFields ? "stt" : "pfd"));
        if (diagramType === "ec") return normalizeEcGraphData(parsed);
        const usedNodeIds = new Set();
        const nodes = parsed.nodes.map((node, index) => {
          let id = String(node.unique_id || node.uid || node.id || `node-import-${index + 1}`);
          while (usedNodeIds.has(id)) id = `${id}-${index + 1}`;
          usedNodeIds.add(id);
          const type = normalizeNodeType(node.type, diagramType);
          const stt = normalizeSttFields(node.stt || node);
          const text = type === "stt"
            ? String(node.text || node.title || node.id || stt.id || "")
            : (type === "crt"
              ? String(node.text || node.title || node.id || "")
              : (typeof node.text === "string" ? node.text : (typeof node.title === "string" ? node.title : "")));
          if (type === "stt" && !stt.id) stt.id = text;
          return {
            id,
            type,
            text,
            detail: typeof node.detail === "string" ? node.detail : "",
            estimate: typeof node.estimate === "string" ? node.estimate : "",
            owner: typeof node.owner === "string" ? node.owner : "",
            statuses: normalizeStatuses(node.statuses),
            color: normalizeCrtColor(node.color),
            stt,
            x: Number.isFinite(node.x) ? node.x : index * GRID_X,
            y: Number.isFinite(node.y) ? node.y : 0,
            gridX: Number.isFinite(node.gridX) ? node.gridX : index,
            gridY: Number.isFinite(node.gridY) ? node.gridY : 0
          };
        });
        const nodeById = new Map(nodes.map(node => [node.id, node]));
        const usedEdgeIds = new Set();
        const seenPairs = new Set();
        const edges = parsed.edges
          .filter(edge => {
            const from = edge.from || edge.source;
            const to = edge.to || edge.destination;
            const source = nodeById.get(from);
            const target = nodeById.get(to);
            if (!source || !target || source.id === target.id) return false;
            if (diagramType === "pfd" && source.type === target.type) return false;
            const key = `${source.id}->${target.id}`;
            if (seenPairs.has(key)) return false;
            seenPairs.add(key);
            return true;
          })
          .map((edge, index) => {
            let id = String(edge.id || `edge-import-${index + 1}`);
            while (usedEdgeIds.has(id)) id = `${id}-${index + 1}`;
            usedEdgeIds.add(id);
            return {
              id,
              from: edge.from || edge.source,
              to: edge.to || edge.destination,
              fromSide: "right",
              toSide: "left",
              and: diagramType === "crt" ? normalizeCrtAnd(edge.and) : undefined
            };
          });

        return {
          nodes,
          edges,
          diagramType,
          viewMode: parsed.viewMode === "detail" ? "detail" : null,
          nodeTextSize: normalizeNodeTextSize(parsed.nodeTextSize)
        };
      }

      function normalizeEcGraphData(parsed) {
        const importedById = new Map();
        parsed.nodes.forEach((node, index) => {
          const id = String(node.unique_id || node.uid || node.id || node.ecRole || `node-import-${index + 1}`);
          importedById.set(id, node);
        });
        const nodes = makeInitialEcNodes().map(defaultNode => {
          const source = importedById.get(defaultNode.id) || importedById.get(defaultNode.ecRole) || {};
          const text = typeof source.text === "string"
            ? source.text
            : (typeof source.title === "string" ? source.title : defaultNode.text);
          return {
            ...defaultNode,
            text,
            detail: typeof source.detail === "string" ? source.detail : "",
            x: Number.isFinite(source.x) ? source.x : defaultNode.x,
            y: Number.isFinite(source.y) ? source.y : defaultNode.y
          };
        });
        return {
          nodes,
          edges: makeEcEdges(),
          diagramType: "ec",
          viewMode: parsed.viewMode === "detail" ? "detail" : null,
          nodeTextSize: normalizeNodeTextSize(parsed.nodeTextSize)
        };
      }

      function normalizeNodeType(type, diagramType = state.diagramType) {
        if (diagramType === "ec") return "ec";
        if (diagramType === "crt") return "crt";
        if (diagramType === "stt") return "stt";
        return type === "process" ? "process" : "artifact";
      }

      function normalizeSttFields(value = {}) {
        const source = value || {};
        const normalized = {
          id: typeof source.id === "string" ? source.id : "",
        };
        STT_FIELDS.forEach(field => {
          const raw = source[field.key] ?? source[field.legacy] ?? "";
          normalized[field.key] = typeof raw === "string" ? raw : String(raw || "");
        });
        return normalized;
      }

      function isPfdDiagram() {
        return state.diagramType === "pfd";
      }

      function isSttDiagram() {
        return state.diagramType === "stt";
      }

      function isCrtDiagram() {
        return state.diagramType === "crt";
      }

      function isUpwardDiagram() {
        return isSttDiagram() || isCrtDiagram();
      }

      function isEcDiagram() {
        return state.diagramType === "ec";
      }

      function isSttNode(node) {
        return node?.type === "stt";
      }

      function isCrtNode(node) {
        return node?.type === "crt";
      }

      function isEcNode(node) {
        return node?.type === "ec";
      }

      function isEcAssumptionNode(node) {
        return isEcNode(node) && node.ecKind === "assumption";
      }

      function shouldShowEcAssumptions() {
        return !isEcDiagram() || state.viewMode === "detail";
      }

      function isNodeVisibleInCurrentMode(node) {
        return !(isEcDiagram() && !shouldShowEcAssumptions() && isEcAssumptionNode(node));
      }

      function visibleNodes() {
        return state.nodes.filter(isNodeVisibleInCurrentMode);
      }

      function ensureVisibleSelection() {
        if (state.selected?.type !== "node") return;
        const node = findNode(state.selected.id);
        if (node && isNodeVisibleInCurrentMode(node)) return;
        const fallback = findNode("head") || visibleNodes()[0] || state.nodes[0];
        state.selected = fallback ? { type: "node", id: fallback.id } : null;
        state.detailVisible = false;
        state.detailEditing = false;
        state.detailEditingNodeId = null;
      }

      function supportsPorts() {
        return !isEcDiagram();
      }

      function cloneNodeData(node) {
        const clone = {
          ...node,
          estimate: typeof node.estimate === "string" ? node.estimate : "",
          owner: typeof node.owner === "string" ? node.owner : "",
          statuses: normalizeStatuses(node.statuses),
          color: normalizeCrtColor(node.color)
        };
        if (node.type === "stt") clone.stt = normalizeSttFields(node.stt || node);
        else delete clone.stt;
        return clone;
      }

      function graphPayload() {
        return {
          diagramType: state.diagramType,
          nodes: state.nodes.map(cloneNodeData),
          edges: state.edges.map(edge => ({ ...edge })),
          viewMode: state.viewMode,
          nodeTextSize: state.nodeTextSize
        };
      }

      function normalizeNodeTextSize(value) {
        const number = Number(value);
        return Number.isFinite(number)
          ? Math.min(18, Math.max(10, Math.round(number)))
          : DEFAULT_NODE_TEXT_SIZE;
      }

      function applyGraphData(graph) {
        state.diagramType = DIAGRAM_TYPES[graph.diagramType] ? graph.diagramType : "pfd";
        state.nodes = graph.nodes.map(cloneNodeData);
        state.edges = graph.edges.map(edge => ({ ...edge }));
        if (graph.viewMode) state.viewMode = graph.viewMode;
        state.nodeTextSize = normalizeNodeTextSize(graph.nodeTextSize);
        state.selected = state.nodes[0] ? { type: "node", id: state.nodes[0].id } : null;
        state.pendingPort = null;
        state.editingNodeField = null;
        state.detailVisible = false;
        state.detailEditing = false;
        state.detailEditingNodeId = null;
        nextId = computeNextIdFromGraph();
        autoLayout();
        closePalette();
        closeEditor();
        render();
        saveState();
        centerOnGraph();
      }

      function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) {
          makeInitialState();
          return;
        }

        try {
          const parsed = JSON.parse(saved);
          const graph = normalizeGraphData(parsed);
          state.diagramType = DIAGRAM_TYPES[graph.diagramType] ? graph.diagramType : "pfd";
          state.nodes = graph.nodes.map(cloneNodeData);
          state.edges = graph.edges;
          if (graph.viewMode) state.viewMode = graph.viewMode;
          state.nodeTextSize = normalizeNodeTextSize(graph.nodeTextSize);
          nextId = computeNextIdFromGraph();
          state.selected = { type: "node", id: state.nodes[0].id };
          state.editingNodeField = null;
        } catch {
          makeInitialState();
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(graphPayload()));
      }

      function cloneSnapshot() {
        return {
          diagramType: state.diagramType,
          nodes: state.nodes.map(cloneNodeData),
          edges: state.edges.map(edge => ({ ...edge })),
          selected: state.selected ? { ...state.selected } : null,
          nextId
        };
      }

      function snapshotKey(snapshot) {
        return JSON.stringify(snapshot);
      }

      function computeNextIdFromGraph() {
        return Math.max(
          1,
          ...state.nodes.concat(state.edges).map(item => {
            const match = String(item.id).match(/-(\d+)$/);
            return match ? Number(match[1]) + 1 : 1;
          })
        );
      }

      function recordHistory() {
        const snapshot = cloneSnapshot();
        const previous = history.past[history.past.length - 1];
        if (!previous || snapshotKey(previous) !== snapshotKey(snapshot)) {
          history.past.push(snapshot);
          if (history.past.length > history.limit) history.past.shift();
        }
        history.future = [];
        updateHistoryControls();
      }

      function restoreSnapshot(snapshot) {
        state.diagramType = DIAGRAM_TYPES[snapshot.diagramType] ? snapshot.diagramType : "pfd";
        state.nodes = snapshot.nodes.map(cloneNodeData);
        state.edges = snapshot.edges.map(edge => ({ ...edge }));
        state.pendingPort = null;
        state.editingNodeId = null;
        state.editingNodeField = null;
        const nodeIds = new Set(state.nodes.map(node => node.id));
        const edgeIds = new Set(state.edges.map(edge => edge.id));
        if (snapshot.selected?.type === "node" && nodeIds.has(snapshot.selected.id)) {
          state.selected = { ...snapshot.selected };
        } else if (snapshot.selected?.type === "edge" && edgeIds.has(snapshot.selected.id)) {
          state.selected = { ...snapshot.selected };
        } else {
          state.selected = state.nodes[0] ? { type: "node", id: state.nodes[0].id } : null;
        }
        ensureVisibleSelection();
        nextId = Math.max(snapshot.nextId || 1, computeNextIdFromGraph());
        closePalette();
        state.detailEditing = false;
        state.detailEditingNodeId = null;
        closeEditor();
        render();
        saveState();
      }

      function undo() {
        if (!history.past.length) {
          setStatus("戻せる操作はありません");
          return;
        }
        history.future.push(cloneSnapshot());
        restoreSnapshot(history.past.pop());
        setStatus("元に戻しました");
        updateHistoryControls();
      }

      function redo() {
        if (!history.future.length) {
          setStatus("やり直せる操作はありません");
          return;
        }
        history.past.push(cloneSnapshot());
        restoreSnapshot(history.future.pop());
        setStatus("やり直しました");
        updateHistoryControls();
      }

      function updateHistoryControls() {
        document.querySelectorAll('[data-command="undo"]').forEach(button => {
          button.disabled = history.past.length === 0;
        });
        document.querySelectorAll('[data-command="redo"]').forEach(button => {
          button.disabled = history.future.length === 0;
        });
      }

      function setViewMode(mode) {
        const nextMode = mode === "detail" ? "detail" : "simple";
        if (state.viewMode === nextMode) return;
        state.viewMode = nextMode;
        state.editingNodeField = null;
        ensureVisibleSelection();
        autoLayout();
        render();
        saveState();
        setStatus(nextMode === "detail" ? "詳細モードに切り替えました" : "シンプルモードに切り替えました");
      }

      function setDiagramType(diagramType) {
        const nextType = DIAGRAM_TYPES[diagramType] ? diagramType : "pfd";
        if (state.diagramType === nextType) return;
        const hasWork = state.nodes.length > 1 || state.edges.length > 0 || (state.nodes[0] && state.nodes[0].text !== DIAGRAM_TYPES[state.diagramType].rootText);
        if (hasWork && !confirm("図の種類を切り替えると、新しい図として開始します。切り替えますか？")) {
          updateDiagramControls();
          return;
        }
        recordHistory();
        nextId = 1;
        makeInitialState(nextType);
        state.pan = { x: 0, y: 0 };
        state.zoom = 1;
        autoLayout();
        render();
        saveState();
        centerOnGraph();
        setStatus(nextType === "stt" ? "S&Tを開始しました" : (nextType === "crt" ? "CRTを開始しました" : (nextType === "ec" ? "ECを開始しました" : "PFDを開始しました")));
      }

      function updateDiagramControls() {
        const config = DIAGRAM_TYPES[state.diagramType] || DIAGRAM_TYPES.pfd;
        brandTitle.textContent = config.title;
        brandSubtitle.textContent = config.subtitle;
        diagramTypeSelect.value = state.diagramType;
        addToolbarGroup.hidden = !isPfdDiagram();
        document.querySelectorAll("[data-diagram-tool]").forEach(button => {
          button.hidden = button.dataset.diagramTool !== state.diagramType;
        });
      }

      function updateViewModeControls() {
        updateDiagramControls();
        document.querySelectorAll("[data-mode]").forEach(button => {
          const active = button.dataset.mode === state.viewMode;
          button.classList.toggle("active", active);
          button.setAttribute("aria-pressed", active ? "true" : "false");
        });
        detailTools.classList.toggle("visible", state.viewMode === "detail" && isPfdDiagram());
        const metricStrip = detailTools.querySelector(".metric-strip");
        if (metricStrip) metricStrip.hidden = !isPfdDiagram();
        updateDetailMetrics();
        updateTextSizeControls();
      }

      function updateDetailMetrics() {
        const metrics = estimateMetrics();
        const critical = criticalPathInfo();
        totalEstimateValue.textContent = formatEstimateDays(metrics.totalDays);
        doneEstimateValue.textContent = formatEstimateDays(metrics.doneDays);
        progressRateValue.textContent = `${Math.round(metrics.progress * 100)}%`;
        criticalEstimateValue.textContent = formatEstimateDays(critical.totalDays);
        criticalDoneValue.textContent = formatEstimateDays(critical.doneDays);
        criticalProgressValue.textContent = `${Math.round(critical.progress * 100)}%`;
      }

      function updateTextSizeControls() {
        const size = normalizeNodeTextSize(state.nodeTextSize);
        nodeTextSizeSlider.value = String(size);
        nodeTextSizeValue.textContent = `${size}px`;
      }

      function setNodeTextSize(value, persist = false) {
        const nextSize = normalizeNodeTextSize(value);
        if (state.nodeTextSize === nextSize && !persist) return;
        state.nodeTextSize = nextSize;
        autoLayout();
        render();
        if (persist) saveState();
      }

      function applyNodeDisplayScale(el) {
        const titleSize = normalizeNodeTextSize(state.nodeTextSize);
        const metaSize = Math.max(9, Math.round(titleSize * .82 * 10) / 10);
        const iconSize = Math.max(15, Math.round(titleSize * 1.38));
        const iconSvgSize = Math.max(10, Math.round(titleSize * .92));
        el.style.setProperty("--node-text-size", `${titleSize}px`);
        el.style.setProperty("--node-title-size", `${titleSize}px`);
        el.style.setProperty("--node-meta-size", `${metaSize}px`);
        el.style.setProperty("--node-stt-label-size", `${Math.max(8.5, Math.round(titleSize * .68 * 10) / 10)}px`);
        el.style.setProperty("--node-status-icon-size", `${iconSize}px`);
        el.style.setProperty("--node-status-svg-size", `${iconSvgSize}px`);
        el.style.setProperty("--node-status-choice-height", `${iconSize + 4}px`);
        el.style.setProperty("--node-estimate-field-width", `${Math.round(metaSize * 6.5)}px`);
        el.style.setProperty("--node-owner-field-width", `${Math.round(metaSize * 6.8)}px`);
      }

      function isTextEditingTarget(target) {
        return Boolean(target.closest("textarea, input, [contenteditable='true']"));
      }

      function isTitleEditingTarget(target) {
        return Boolean(target.closest(".title-editor"));
      }

      function clearCenterClickTimer() {
        if (centerClickTimer) {
          clearTimeout(centerClickTimer);
          centerClickTimer = null;
        }
      }

      function isNodeCenterClick(nodeEl, event) {
        const rect = nodeEl.getBoundingClientRect();
        const dx = Math.abs(event.clientX - (rect.left + rect.width / 2));
        const dy = Math.abs(event.clientY - (rect.top + rect.height / 2));
        return dx <= rect.width * .28 && dy <= rect.height * .28;
      }

      function nodeDetailFieldFromClick(nodeEl, event) {
        if (state.viewMode !== "detail") return null;
        const node = findNode(nodeEl.dataset.nodeId);
        if (isCrtNode(node)) return null;
        if (isEcNode(node)) return null;
        if (isSttNode(node)) return null;
        const hotspot = event.target.closest("[data-node-field-hotspot]");
        if (hotspot) return hotspot.dataset.nodeFieldHotspot;
        const rect = nodeEl.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width;
        const y = (event.clientY - rect.top) / rect.height;
        if (x <= .45 && y <= .42) return "statuses";
        if (x <= .48 && y >= .58) return "estimate";
        if (x >= .52 && y >= .58) return "owner";
        return null;
      }

      function findNode(id) {
        return state.nodes.find(node => node.id === id);
      }

      function findEdge(id) {
        return state.edges.find(edge => edge.id === id);
      }

      function selectedNode() {
        return state.selected?.type === "node" ? findNode(state.selected.id) : null;
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function setHint(text) {
        hintEl.textContent = text;
      }

      function displayText(node) {
        if (node.text.trim()) return node.text;
        if (isEcNode(node)) return ecNodeTitle(node);
        if (isCrtNode(node)) return "CRTエンティティ";
        if (isSttNode(node)) return "S&T項目";
        return node.type === "process" ? "プロセス" : "成果物";
      }

      function nodeTypeLabel(type) {
        if (type === "ec") return "EC";
        if (type === "crt") return "CRT";
        if (type === "stt") return "S&T項目";
        return type === "process" ? "プロセス" : "成果物";
      }

      function defaultText(type) {
        if (type === "ec") return "EC";
        if (type === "crt") return "症状・結果";
        if (type === "stt") return "1";
        return type === "process" ? "プロセス" : "成果物";
      }

      function ecDefinition(nodeOrId) {
        const id = typeof nodeOrId === "string" ? nodeOrId : nodeOrId?.ecRole || nodeOrId?.id;
        return EC_NODE_DEF_BY_ID.get(id) || EC_NODE_DEFS[0];
      }

      function ecNodeTitle(node) {
        const def = ecDefinition(node);
        return `${def.code} ${def.title}`;
      }

      function oppositeType(type) {
        if (isEcDiagram()) return "ec";
        if (isCrtDiagram()) return "crt";
        if (isSttDiagram()) return "stt";
        return type === "process" ? "artifact" : "process";
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeAttribute(value) {
        return escapeHtml(value).replaceAll("`", "&#96;");
      }

      function normalizeStatuses(value) {
        if (!Array.isArray(value)) return [];
        const seen = new Set();
        return value
          .map(item => String(item))
          .filter(id => {
            if (!STATUS_IDS.has(id) || seen.has(id)) return false;
            seen.add(id);
            return true;
          })
          .slice(0, 3);
      }

      function normalizeCrtColor(value) {
        const id = String(value || "None");
        return CRT_COLOR_BY_ID.has(id) ? id : "None";
      }

      function normalizeCrtAnd(value) {
        const text = String(value || "None").trim();
        return text && text !== "None" ? text : "None";
      }

      function hasCrtAnd(edge) {
        return isCrtDiagram() && normalizeCrtAnd(edge?.and) !== "None";
      }

      function crtColorDefinition(value) {
        return CRT_COLOR_BY_ID.get(normalizeCrtColor(value)) || CRT_COLORS[0];
      }

      function statusLabel(id) {
        return STATUS_OPTIONS.find(status => status.id === id)?.label || id;
      }

      function estimateMetrics() {
        const processNodes = state.nodes.filter(node => node.type === "process");
        const totalDays = processNodes.reduce((sum, node) => sum + estimateDaysFromText(node.estimate), 0);
        const doneDays = processNodes
          .filter(node => normalizeStatuses(node.statuses).includes("done"))
          .reduce((sum, node) => sum + estimateDaysFromText(node.estimate), 0);
        return {
          totalDays,
          doneDays,
          progress: totalDays > 0 ? Math.min(1, doneDays / totalDays) : 0
        };
      }

      function estimateDaysFromText(value) {
        const text = normalizeEstimateText(value);
        if (!text) return 0;
        const tokenPattern = /(\d+(?:\.\d+)?)\s*(ヶ月|カ月|か月|weeks?|week|w|週間|週|months?|month|mo|days?|day|d|日間|日|hours?|hour|hrs?|hr|h|時間|時|minutes?|minute|mins?|min|分)?/gi;
        let total = 0;
        let matched = false;
        let match;
        while ((match = tokenPattern.exec(text))) {
          const amount = Number(match[1]);
          if (!Number.isFinite(amount)) continue;
          matched = true;
          total += amount * estimateUnitToDays(match[2] || "");
        }
        return matched ? total : 0;
      }

      function normalizeEstimateText(value) {
        return String(value || "")
          .replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xfee0))
          .replace(/[．，]/g, char => char === "．" ? "." : ",")
          .replace(/,/g, "")
          .trim();
      }

      function estimateUnitToDays(unit) {
        const normalized = String(unit || "").toLowerCase();
        if (!normalized) return 1;
        if (/^(時間|時|h|hr|hrs|hour|hours)$/.test(normalized)) return 1 / WORK_HOURS_PER_DAY;
        if (/^(分|min|mins|minute|minutes)$/.test(normalized)) return 1 / (WORK_HOURS_PER_DAY * 60);
        if (/^(週|週間|w|week|weeks)$/.test(normalized)) return 5;
        if (/^(ヶ月|カ月|か月|月|mo|month|months)$/.test(normalized)) return 20;
        return 1;
      }

      function formatEstimateDays(days) {
        if (!Number.isFinite(days) || days <= 0) return "0日";
        if (days < 1) return `${formatNumber(days * WORK_HOURS_PER_DAY)}時間`;
        return `${formatNumber(days)}日`;
      }

      function formatNumber(value) {
        const rounded = Math.round(value * 10) / 10;
        return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
      }

      function criticalPathInfo() {
        const nodeMap = new Map(state.nodes.map(node => [node.id, node]));
        const validEdges = state.edges.filter(edge => nodeMap.has(edge.from) && nodeMap.has(edge.to));
        const outgoing = new Map(state.nodes.map(node => [node.id, []]));
        const indegree = new Map(state.nodes.map(node => [node.id, 0]));
        validEdges.forEach(edge => {
          outgoing.get(edge.from).push(edge);
          indegree.set(edge.to, (indegree.get(edge.to) || 0) + 1);
        });

        const queue = state.nodes
          .filter(node => (indegree.get(node.id) || 0) === 0)
          .sort(compareGraphOrder)
          .map(node => node.id);
        const order = [];
        const queued = new Set(queue);
        while (queue.length) {
          const id = queue.shift();
          order.push(id);
          (outgoing.get(id) || []).forEach(edge => {
            indegree.set(edge.to, Math.max(0, (indegree.get(edge.to) || 0) - 1));
            if (indegree.get(edge.to) === 0 && !queued.has(edge.to)) {
              queued.add(edge.to);
              queue.push(edge.to);
              queue.sort((left, right) => compareGraphOrder(nodeMap.get(left), nodeMap.get(right)));
            }
          });
        }

        state.nodes
          .filter(node => !queued.has(node.id))
          .sort(compareGraphOrder)
          .forEach(node => order.push(node.id));

        const distance = new Map();
        const predecessor = new Map();
        state.nodes.forEach(node => {
          distance.set(node.id, nodeDurationDays(node));
        });

        order.forEach(id => {
          const baseDistance = distance.get(id) || 0;
          (outgoing.get(id) || []).forEach(edge => {
            const target = nodeMap.get(edge.to);
            const candidate = baseDistance + nodeDurationDays(target);
            const currentDistance = distance.get(edge.to) || 0;
            const tiesInitialProcess = target?.type === "process" &&
              !predecessor.has(edge.to) &&
              Math.abs(candidate - currentDistance) <= 1e-9 &&
              candidate > 0;
            if (candidate > currentDistance + 1e-9 || tiesInitialProcess) {
              distance.set(edge.to, candidate);
              predecessor.set(edge.to, edge);
            }
          });
        });

        const endId = [...distance.entries()]
          .sort((a, b) => b[1] - a[1] || compareGraphOrder(nodeMap.get(b[0]), nodeMap.get(a[0])))
          [0]?.[0];
        if (!endId || (distance.get(endId) || 0) <= 0) return emptyCriticalPathInfo();

        const criticalEdges = new Set();
        const criticalNodes = new Set([endId]);
        const seenNodes = new Set();
        let currentId = endId;
        while (predecessor.has(currentId) && !seenNodes.has(currentId)) {
          seenNodes.add(currentId);
          const edge = predecessor.get(currentId);
          criticalEdges.add(edge.id);
          currentId = edge.from;
          criticalNodes.add(currentId);
        }
        const totalDays = distance.get(endId) || 0;
        const doneDays = [...criticalNodes].reduce((sum, nodeId) => {
          const node = nodeMap.get(nodeId);
          if (node?.type !== "process" || !normalizeStatuses(node.statuses).includes("done")) return sum;
          return sum + nodeDurationDays(node);
        }, 0);
        return {
          edgeIds: criticalEdges,
          nodeIds: criticalNodes,
          totalDays,
          doneDays,
          progress: totalDays > 0 ? Math.min(1, doneDays / totalDays) : 0
        };
      }

      function emptyCriticalPathInfo() {
        return {
          edgeIds: new Set(),
          nodeIds: new Set(),
          totalDays: 0,
          doneDays: 0,
          progress: 0
        };
      }

      function criticalPathEdgeIds() {
        return criticalPathInfo().edgeIds;
      }

      function nodeDurationDays(node) {
        return node?.type === "process" ? estimateDaysFromText(node.estimate) : 0;
      }

      function compareGraphOrder(left, right) {
        if (!left || !right) return 0;
        return (left.gridX || 0) - (right.gridX || 0) ||
          (left.gridY || 0) - (right.gridY || 0) ||
          left.id.localeCompare(right.id);
      }

      function statusIcon(id) {
        if (id === "done") {
          return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M20 6 9 17l-5-5"></path></svg>';
        }
        if (id === "trouble") {
          return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M12 9v4"></path><path d="M12 17h.01"></path><path d="m10.3 4.3-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-2.7l-8-14a2 2 0 0 0-3.4 0Z"></path></svg>';
        }
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="12" cy="12" r="8"></circle><path d="M12 8v5l3 2"></path></svg>';
      }

      function renderStatusIcon(id) {
        const safeId = escapeAttribute(id);
        const label = escapeAttribute(statusLabel(id));
        return `<span class="status-icon ${safeId}" title="${label}" aria-label="${label}">${statusIcon(id)}</span>`;
      }

      function renderStatusPill(id) {
        return `<span class="detail-status-pill">${renderStatusIcon(id)}${escapeHtml(statusLabel(id))}</span>`;
      }

      function renderDetailMeta(node, editing = false) {
        if (isEcNode(node)) return renderEcDetailFields(node, editing);
        if (isCrtNode(node)) return renderCrtDetailFields(node, editing);
        if (isSttNode(node)) return renderSttDetailFields(node, editing);
        const estimate = (node.estimate || "").trim();
        const owner = (node.owner || "").trim();
        const statuses = normalizeStatuses(node.statuses);
        if (editing) {
          return `
          <dl class="detail-meta-grid">
            <div><dt>見積もり期間</dt><dd data-meta-field="estimate">${renderEditableText(estimate, "estimate", "未設定")}</dd></div>
            <div><dt>担当者</dt><dd data-meta-field="owner">${renderEditableOwner(owner)}</dd></div>
            <div><dt>状況</dt><dd data-meta-field="status">${renderEditableStatuses(statuses)}</dd></div>
          </dl>
        `;
        }
        const statusHtml = statuses.length
          ? `<span class="detail-status-list">${statuses.map(renderStatusPill).join("")}</span>`
          : '<span class="detail-muted">未設定</span>';
        return `
          <dl class="detail-meta-grid">
            <div><dt>見積もり期間</dt><dd data-meta-field="estimate">${estimate ? escapeHtml(estimate) : '<span class="detail-muted">未設定</span>'}</dd></div>
            <div><dt>担当者</dt><dd data-meta-field="owner">${owner ? escapeHtml(owner) : '<span class="detail-muted">未設定</span>'}</dd></div>
            <div><dt>状況</dt><dd data-meta-field="status">${statusHtml}</dd></div>

      function renderSttDetailFields(node, editing = false) {
        const stt = normalizeSttFields(node.stt || node);
        return `
          <div class="stt-detail-grid">
            ${STT_FIELDS.map(field => {

                  <label class="stt-detail-field">
                    <strong>${escapeHtml(field.label)}</strong>
                    <textarea class="stt-detail-textarea" data-stt-field="${escapeAttribute(field.key)}" rows="3" spellcheck="false">${escapeHtml(value)}</textarea>
                  </label>
                `;
              }
              return `
                <div class="stt-detail-field" data-meta-field="${escapeAttribute(field.key)}">
                  <strong>${escapeHtml(field.label)}</strong>
                  <div class="stt-detail-value${value ? "" : " empty"}">${value ? escapeHtml(value) : "未設定"}</div>
                </div>
              `;
            }).join("")}
          </div>
        `;
      }

      function renderEcDetailFields(node, editing = false) {
        const def = ecDefinition(node);
        const value = (node.text || "").trim();
        if (editing) {
          return `
            <label class="ec-detail-field">
              <strong>${escapeHtml(def.title)}</strong>
              <div class="ec-detail-question">${escapeHtml(def.question)}</div>
              <textarea class="ec-detail-textarea" data-ec-field="text" rows="7" spellcheck="false">${escapeHtml(value)}</textarea>
            </label>
          `;
        }
        return `
          <div class="ec-detail-field" data-meta-field="ec-text">
            <strong>${escapeHtml(def.title)}</strong>
            <div class="ec-detail-question">${escapeHtml(def.question)}</div>
            <div class="ec-detail-value${value ? "" : " empty"}">${value ? escapeHtml(value) : "未設定"}</div>
          </div>
